<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>塔罗能量站 ✨</title>
<meta name="description" content="每天一张塔罗牌，给你满满正能量 ✨">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue','Segoe UI',Roboto,sans-serif;background:#fcfbff;color:#1e1930;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}
.container{text-align:center;padding:2rem 1.2rem;max-width:420px;width:100%}
.title-row{display:flex;align-items:center;justify-content:center;gap:.6rem;margin-bottom:.4rem}
.title-star{font-size:1rem;color:#c5b8e0}
h1{font-size:1.8rem;font-weight:700;color:#2a2045;margin:0}
.subtitle{font-size:.88rem;color:#8a80a0;margin-bottom:2.5rem;text-align:center}
.cards{display:flex;flex-direction:column;gap:1.2rem}
.entry-card{
  background:#f8f6ff;border:1px solid rgba(140,120,180,.12);
  border-radius:18px;padding:2rem 1.5rem;cursor:pointer;text-decoration:none;color:#1e1930;
  transition:all .3s ease;display:block;
}
.entry-card:hover,.entry-card:active{transform:translateY(-2px);box-shadow:0 4px 20px rgba(100,80,160,.08);border-color:rgba(140,120,180,.25)}
.entry-card .icon{font-size:2.5rem;margin-bottom:.6rem}
.entry-card .title{font-size:1.15rem;font-weight:700;color:#2a2045;margin-bottom:.3rem}
.entry-card .desc{font-size:.82rem;color:#8a80a0;line-height:1.6}
.footer{margin-top:3rem;font-size:.7rem;color:#c5c0d5}
</style>
</head>
<body>
<div class="container">
  <div class="title-row"><span class="title-star">✦</span><h1 id="siteTitle"></h1><span class="title-star">✦</span></div>
  <div class="subtitle" id="siteSub"></div>
  <div class="cards">
    <a class="entry-card" href="daily.html">
      <div class="icon">🌅</div>
      <div class="title" id="dailyTitle"></div>
      <div class="desc" id="dailyDesc"></div>
    </a>
    <a class="entry-card" href="question.html">
      <div class="icon">🔮</div>
      <div class="title" id="questionTitle"></div>
      <div class="desc" id="questionDesc"></div>
    </a>
  </div>
  <div class="footer" id="footerText"></div>
</div>
<script src="cards.js"></script>
<script>
document.getElementById('siteTitle').textContent = t(UI.site_name);
document.getElementById('siteSub').textContent = t(UI.site_sub);
document.getElementById('dailyTitle').textContent = t(UI.daily_title);
document.getElementById('dailyDesc').innerHTML = t(UI.daily_desc);
document.getElementById('questionTitle').textContent = t(UI.question_title);
document.getElementById('questionDesc').innerHTML = t(UI.question_desc);
document.getElementById('footerText').textContent = t(UI.footer_home);
</script>
</body>
</html>
