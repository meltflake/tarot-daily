<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>心事求签 🔮</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif SC',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;transition:background 1.8s ease,color 1.8s ease}
body{background:#0f0a1a;color:#e2e0ef}
#bgLayer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;transition:opacity 1.5s ease}
.container{position:relative;z-index:1;max-width:420px;width:100%;padding:2rem 1.2rem;text-align:center}
.back-link{display:inline-block;color:rgba(255,255,255,.5);font-size:.8rem;text-decoration:none;margin-bottom:1rem;padding:.3rem .8rem;border:1px solid rgba(255,255,255,.15);border-radius:15px;transition:all 1.5s ease}
h1{font-size:1.5rem;font-weight:700;margin-bottom:.3rem;transition:color 1.5s ease}
.subtitle{font-size:.85rem;opacity:.7;margin-bottom:1.5rem;transition:color 1.5s ease}
.question-area{margin-bottom:1.5rem}
.question-area input{width:100%;padding:.8rem 1rem;background:rgba(255,255,255,.06);border:1.5px solid rgba(167,139,250,.25);border-radius:12px;color:inherit;font-size:.95rem;font-family:inherit;outline:none;text-align:center;transition:all 1.5s ease}
.question-area input:focus{border-color:rgba(167,139,250,.5);box-shadow:0 0 15px rgba(167,139,250,.15)}
.question-area input::placeholder{color:rgba(255,255,255,.35)}
.question-hint{font-size:.72rem;opacity:.4;margin-top:.5rem}
.card-container{perspective:800px;margin:0 auto 2rem;width:260px;height:400px;cursor:pointer}
.card-inner{position:relative;width:100%;height:100%;transition:transform .8s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.card-inner.flipped{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;overflow:hidden;transition:all 1.5s ease}
.card-front{background:rgba(255,255,255,.04);border:2px solid rgba(167,139,250,.25);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(167,139,250,.1)}
.card-front .symbol{font-size:4rem;margin-bottom:1rem;animation:float 3s ease-in-out infinite}
.card-front .tap-hint{font-size:.8rem;color:rgba(167,139,250,.6);animation:pulse 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.card-back{transform:rotateY(180deg);display:flex;flex-direction:column;align-items:center;padding:1.2rem 1rem;transition:all 1.5s ease}
.card-back{background:linear-gradient(145deg,#1a1230,#0f0a1a);border:2px solid rgba(167,139,250,.3);box-shadow:0 0 40px rgba(167,139,250,.15)}
.card-back .question-echo{font-size:.76rem;margin-bottom:.3rem;padding:.25rem .7rem;border-radius:8px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:all 1.5s ease;background:rgba(167,139,250,.1);color:rgba(167,139,250,.8)}
.card-back .topic-label{font-size:.7rem;margin-bottom:.5rem;transition:color 1.5s ease;color:#f472b6}
.card-back .card-emoji{font-size:2.5rem;margin-bottom:.3rem}
.card-back .card-name{font-size:1rem;font-weight:700;margin-bottom:.15rem;transition:color 1.5s ease}
.card-back .card-name-en{font-size:.7rem;opacity:.6;margin-bottom:.5rem}
.card-back .card-keyword{display:flex;gap:.3rem;flex-wrap:wrap;justify-content:center;margin-bottom:.6rem}
.card-back .kw{padding:.15rem .5rem;border-radius:20px;font-size:.68rem;transition:all 1.5s ease;background:rgba(167,139,250,.15);color:#a78bfa}
.card-back .card-msg{font-size:.85rem;line-height:1.7;flex:1;display:flex;align-items:center;text-align:center;transition:color 1.5s ease}
.card-back .card-wish{font-size:.75rem;margin-top:.4rem;font-style:italic;transition:color 1.5s ease}
.result{display:none;margin-top:1rem}
.result.show{display:block;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.again-btn{border:none;padding:.7rem 2rem;border-radius:25px;font-size:.88rem;cursor:pointer;font-family:inherit;transition:all 1.5s ease;background:#a78bfa;color:#fff;box-shadow:0 4px 20px rgba(167,139,250,.3);margin-top:.5rem}
.again-btn:active{transform:scale(.95)}
.share-btn{background:rgba(255,255,255,.06);border:1px solid rgba(167,139,250,.2);color:rgba(255,255,255,.5);padding:.5rem 1.5rem;border-radius:20px;font-size:.82rem;cursor:pointer;margin-top:.8rem;font-family:inherit;transition:all 1.5s ease}
.share-btn:active{transform:scale(.95)}
.footer{margin-top:2rem;font-size:.7rem;opacity:.3;padding-bottom:2rem;transition:color 1.5s ease}

/* Particles */
.particle{position:absolute;border-radius:50%;pointer-events:none}
.star{background:#fff;animation:twinkle var(--d) ease-in-out infinite var(--delay)}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.8;transform:scale(1.3)}}
.petal{font-size:1rem;opacity:.4;animation:drift var(--d) linear infinite var(--delay)}
@keyframes drift{0%{transform:translateY(-20px) rotate(0deg) translateX(0);opacity:0}10%{opacity:.4}90%{opacity:.4}100%{transform:translateY(calc(100vh + 20px)) rotate(360deg) translateX(40px);opacity:0}}
.leafp{font-size:1rem;opacity:.3;animation:fall var(--d) linear infinite var(--delay)}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:0}10%{opacity:.3}90%{opacity:.3}100%{transform:translateY(calc(100vh + 20px)) rotate(360deg);opacity:0}}
.firefly{background:#e8a44a;animation:glow var(--d) ease-in-out infinite var(--delay)}
@keyframes glow{0%,100%{opacity:.1;transform:scale(1) translateY(0)}50%{opacity:.7;transform:scale(1.5) translateY(-20px)}}
.sparkle{animation:sparkle var(--d) ease-in-out infinite var(--delay)}
@keyframes sparkle{0%,100%{opacity:.1;transform:scale(.5) rotate(0)}50%{opacity:.6;transform:scale(1.2) rotate(180deg)}}

/* ===== THEME OVERRIDES (same as daily) ===== */
body.theme-sakura{background:#fdf2f5;color:#4a2040}
.theme-sakura .back-link,.theme-sakura .share-btn{color:#b05888;border-color:rgba(176,88,136,.25)}
.theme-sakura h1{color:#c2628a}
.theme-sakura .question-area input{background:rgba(194,98,138,.04);border-color:rgba(194,98,138,.25);color:#4a2040}
.theme-sakura .question-area input::placeholder{color:rgba(74,32,64,.3)}
.theme-sakura .card-back{background:#fffafc;border-color:rgba(194,98,138,.3);box-shadow:0 4px 25px rgba(194,98,138,.1)}
.theme-sakura .card-back .card-name{color:#c2628a}
.theme-sakura .card-back .kw{background:rgba(194,98,138,.12);color:#c2628a}
.theme-sakura .card-back .question-echo{background:rgba(194,98,138,.08);color:#c2628a}
.theme-sakura .card-back .card-wish{color:#d4729e}
.theme-sakura .again-btn{background:#c2628a;box-shadow:0 4px 20px rgba(194,98,138,.25)}

body.theme-forest{background:#f5f0e8;color:#3d3427}
.theme-forest .back-link,.theme-forest .share-btn{color:#7a6e5d;border-color:rgba(90,114,71,.25)}
.theme-forest h1{color:#5a7247}
.theme-forest .question-area input{background:rgba(255,255,255,.5);border-color:rgba(146,176,106,.3);color:#3d3427}
.theme-forest .question-area input::placeholder{color:rgba(61,52,39,.3)}
.theme-forest .card-back{background:#fffdf7;border-color:rgba(146,176,106,.35);box-shadow:0 4px 25px rgba(90,114,71,.1)}
.theme-forest .card-back .card-name{color:#5a7247}
.theme-forest .card-back .kw{background:rgba(146,176,106,.15);color:#5a7247}
.theme-forest .card-back .question-echo{background:rgba(146,176,106,.1);color:#5a7247}
.theme-forest .card-back .card-wish{color:#c77dba}
.theme-forest .again-btn{background:#5a7247;box-shadow:0 4px 20px rgba(90,114,71,.2)}

body.theme-moon{background:#0e1525;color:#c8d4e8}
.theme-moon .back-link,.theme-moon .share-btn{color:rgba(150,170,210,.6);border-color:rgba(100,140,200,.2)}
.theme-moon h1{color:#7dabd4}
.theme-moon .question-area input{background:rgba(100,150,220,.06);border-color:rgba(100,150,220,.25);color:#c8d4e8}
.theme-moon .question-area input::placeholder{color:rgba(200,212,232,.3)}
.theme-moon .card-back{background:linear-gradient(145deg,#121d30,#0e1525);border-color:rgba(100,150,220,.3);box-shadow:0 0 40px rgba(100,150,220,.1)}
.theme-moon .card-back .card-name{color:#7dabd4}
.theme-moon .card-back .kw{background:rgba(100,150,220,.12);color:#7dabd4}
.theme-moon .card-back .question-echo{background:rgba(100,150,220,.1);color:#7dabd4}
.theme-moon .card-back .card-wish{color:#a8b8d8}
.theme-moon .again-btn{background:#4a7aa8;box-shadow:0 4px 20px rgba(74,122,168,.3)}

body.theme-fire{background:#1a0e08;color:#f0dcc8}
.theme-fire .back-link,.theme-fire .share-btn{color:rgba(220,160,100,.6);border-color:rgba(220,160,100,.2)}
.theme-fire h1{color:#e8a44a}
.theme-fire .question-area input{background:rgba(232,164,74,.06);border-color:rgba(232,164,74,.25);color:#f0dcc8}
.theme-fire .question-area input::placeholder{color:rgba(240,220,200,.3)}
.theme-fire .card-back{background:linear-gradient(145deg,#201208,#1a0e08);border-color:rgba(232,164,74,.3);box-shadow:0 0 40px rgba(232,164,74,.1)}
.theme-fire .card-back .card-name{color:#e8a44a}
.theme-fire .card-back .kw{background:rgba(232,164,74,.12);color:#e8a44a}
.theme-fire .card-back .question-echo{background:rgba(232,164,74,.1);color:#e8a44a}
.theme-fire .card-back .card-wish{color:#d4956a}
.theme-fire .again-btn{background:#c87a30;box-shadow:0 4px 20px rgba(200,122,48,.3)}

body.theme-star{background:#f0f4fa;color:#2a3a5a}
.theme-star .back-link,.theme-star .share-btn{color:#6a80a8;border-color:rgba(106,128,168,.25)}
.theme-star h1{color:#4a6a9a}
.theme-star .question-area input{background:rgba(74,106,154,.04);border-color:rgba(74,106,154,.25);color:#2a3a5a}
.theme-star .question-area input::placeholder{color:rgba(42,58,90,.3)}
.theme-star .card-back{background:#f8faff;border-color:rgba(106,128,168,.3);box-shadow:0 4px 25px rgba(74,106,154,.1)}
.theme-star .card-back .card-name{color:#4a6a9a}
.theme-star .card-back .kw{background:rgba(74,106,154,.1);color:#4a6a9a}
.theme-star .card-back .question-echo{background:rgba(74,106,154,.08);color:#4a6a9a}
.theme-star .card-back .card-wish{color:#8a6ab0}
.theme-star .again-btn{background:#4a6a9a;box-shadow:0 4px 20px rgba(74,106,154,.25)}

body.theme-rainbow{background:#fef9f0;color:#4a3a5a}
.theme-rainbow .back-link,.theme-rainbow .share-btn{color:#9a6ab0;border-color:rgba(154,106,176,.25)}
.theme-rainbow h1{color:#8a5aaa}
.theme-rainbow .question-area input{background:rgba(154,106,176,.04);border-color:rgba(154,106,176,.2);color:#4a3a5a}
.theme-rainbow .question-area input::placeholder{color:rgba(74,58,90,.3)}
.theme-rainbow .card-back{background:linear-gradient(145deg,#fff8fa,#f8f0ff);border-color:rgba(154,106,176,.25);box-shadow:0 4px 25px rgba(154,106,176,.1)}
.theme-rainbow .card-back .card-name{color:#8a5aaa}
.theme-rainbow .card-back .kw{background:rgba(154,106,176,.1);color:#8a5aaa}
.theme-rainbow .card-back .question-echo{background:rgba(154,106,176,.08);color:#8a5aaa}
.theme-rainbow .card-back .card-wish{color:#d06090}
.theme-rainbow .again-btn{background:linear-gradient(135deg,#a78bfa,#f472b6);box-shadow:0 4px 20px rgba(167,139,250,.3)}

body.theme-royal{background:#f8f3eb;color:#3a2e20}
.theme-royal .back-link,.theme-royal .share-btn{color:#8a7a5a;border-color:rgba(180,140,60,.25)}
.theme-royal h1{color:#8a6a20}
.theme-royal .question-area input{background:rgba(180,140,60,.04);border-color:rgba(180,140,60,.2);color:#3a2e20}
.theme-royal .question-area input::placeholder{color:rgba(58,46,32,.3)}
.theme-royal .card-back{background:#fdfaf3;border-color:rgba(180,140,60,.3);box-shadow:0 4px 25px rgba(138,106,32,.1)}
.theme-royal .card-back .card-name{color:#8a6a20}
.theme-royal .card-back .kw{background:rgba(180,140,60,.12);color:#8a6a20}
.theme-royal .card-back .question-echo{background:rgba(180,140,60,.08);color:#8a6a20}
.theme-royal .card-back .card-wish{color:#b08a40}
.theme-royal .again-btn{background:#8a6a20;box-shadow:0 4px 20px rgba(138,106,32,.25)}
</style>
</head>
<body>
<div id="bgLayer"></div>
<div class="container">
  <a class="back-link" href="index.html" id="backLink">← 返回</a>
  <h1 id="pageTitle">🔮 心事求签</h1>
  <div class="subtitle" id="pageSub"></div>
  <div class="question-area">
    <input type="text" id="questionInput" placeholder="" maxlength="50" autofocus>
    <div class="question-hint" id="questionHint"></div>
  </div>
  <div class="card-container" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-front">
        <div class="symbol">🔮</div>
        <div class="tap-hint" id="tapHint"></div>
      </div>
      <div class="card-back" id="cardBack"></div>
    </div>
  </div>
  <div class="result" id="result">
    <button class="again-btn" onclick="askAgain()" id="againBtn"></button><br>
    <button class="share-btn" onclick="shareCard()" id="shareBtn"></button>
  </div>
  <div class="footer" id="footerText"></div>
</div>
<script src="qr.min.js"></script>
<script src="cards.js"></script>
<script>
var CARD_THEMES={'愚者':'rainbow','魔术师':'fire','女祭司':'moon','女皇':'sakura','皇帝':'royal','教皇':'royal','恋人':'sakura','战车':'fire','力量':'forest','隐士':'forest','命运之轮':'rainbow','正义':'star','倒吊人':'moon','死神':'rainbow','节制':'forest','恶魔':'fire','塔':'fire','星星':'star','月亮':'moon','太阳':'sakura','审判':'star','世界':'forest'};
var THEME_PARTICLES={
  '':function(el){for(var i=0;i<60;i++){var s=document.createElement('div');s.className='particle star';var z=Math.random()*2.5+1;s.style.cssText='width:'+z+'px;height:'+z+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--d:'+(2+Math.random()*4)+'s;--delay:'+Math.random()*3+'s';el.appendChild(s)}},
  sakura:function(el){var ps=['🌸','🏵️','💮','✿'];for(var i=0;i<18;i++){var s=document.createElement('div');s.className='particle petal';s.textContent=ps[i%ps.length];s.style.cssText='left:'+Math.random()*100+'%;font-size:'+(0.7+Math.random()*0.8)+'rem;--d:'+(5+Math.random()*6)+'s;--delay:'+Math.random()*6+'s';el.appendChild(s)}},
  forest:function(el){var ls=['🍃','🌿','🍂','🌱','☘️'];for(var i=0;i<14;i++){var s=document.createElement('div');s.className='particle leafp';s.textContent=ls[i%ls.length];s.style.cssText='left:'+Math.random()*100+'%;font-size:'+(0.8+Math.random()*0.8)+'rem;--d:'+(6+Math.random()*8)+'s;--delay:'+Math.random()*8+'s';el.appendChild(s)}},
  moon:function(el){for(var i=0;i<50;i++){var s=document.createElement('div');s.className='particle star';var z=Math.random()*2+1;s.style.cssText='width:'+z+'px;height:'+z+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--d:'+(3+Math.random()*5)+'s;--delay:'+Math.random()*4+'s;background:#7dabd4';el.appendChild(s)}},
  fire:function(el){for(var i=0;i<25;i++){var s=document.createElement('div');s.className='particle firefly';var z=Math.random()*4+2;s.style.cssText='width:'+z+'px;height:'+z+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--d:'+(2+Math.random()*4)+'s;--delay:'+Math.random()*3+'s';el.appendChild(s)}},
  star:function(el){var sp=['✦','✧','⋆','✶'];for(var i=0;i<30;i++){var s=document.createElement('div');s.className='particle sparkle';s.textContent=sp[i%sp.length];s.style.cssText='position:absolute;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;font-size:'+(0.5+Math.random()*0.7)+'rem;color:rgba(74,106,154,0.3);--d:'+(2+Math.random()*4)+'s;--delay:'+Math.random()*3+'s';el.appendChild(s)}},
  rainbow:function(el){var rc=['🌈','✨','💫','⭐','🦋'];for(var i=0;i<16;i++){var s=document.createElement('div');s.className='particle petal';s.textContent=rc[i%rc.length];s.style.cssText='left:'+Math.random()*100+'%;font-size:'+(0.7+Math.random()*0.7)+'rem;--d:'+(5+Math.random()*7)+'s;--delay:'+Math.random()*7+'s';el.appendChild(s)}},
  royal:function(el){var rp=['👑','✦','✧','⋆'];for(var i=0;i<20;i++){var s=document.createElement('div');s.className='particle sparkle';s.textContent=rp[i%rp.length];s.style.cssText='position:absolute;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;font-size:'+(0.5+Math.random()*0.6)+'rem;color:rgba(180,140,60,0.3);--d:'+(2+Math.random()*4)+'s;--delay:'+Math.random()*3+'s';el.appendChild(s)}}
};
function applyTheme(n){document.body.className=n?'theme-'+n:'';var bg=document.getElementById('bgLayer');bg.style.opacity='0';setTimeout(function(){bg.innerHTML='';(THEME_PARTICLES[n]||THEME_PARTICLES[''])(bg);bg.style.opacity='1'},800)}

var seed=getDaySeed(),flipped=false,currentCard=null,currentQuestion='',currentTopic='',now=new Date();
applyTheme('');
document.getElementById('backLink').textContent=t(UI.back);
document.getElementById('pageTitle').textContent='🔮 '+t(UI.question_title);
document.getElementById('pageSub').textContent=t(UI.question_sub);
document.getElementById('questionInput').placeholder=t(UI.question_ph);
document.getElementById('questionHint').textContent=t(UI.question_hint);
document.getElementById('tapHint').textContent=t(UI.question_tap);
document.getElementById('againBtn').textContent=t(UI.ask_again);
document.getElementById('shareBtn').textContent=t(UI.share_btn);
document.getElementById('footerText').textContent=t(UI.footer_question);

function flipCard(){
  if(flipped){askAgain();return}
  var q=document.getElementById('questionInput').value.trim();
  if(!q){var inp=document.getElementById('questionInput');inp.style.borderColor='#f472b6';inp.placeholder=t(UI.question_empty);inp.focus();setTimeout(function(){inp.style.borderColor='';inp.placeholder=t(UI.question_ph)},2000);return}
  currentQuestion=q;currentTopic=detectTopic(q);
  var hash=0;for(var i=0;i<q.length;i++)hash=((hash<<5)-hash)+q.charCodeAt(i)+seed;hash=Math.abs(hash);
  currentCard=CARDS[hash%CARDS.length];
  var msg=t(currentCard.msg);var qr=Q_READINGS[currentCard.name.zh];if(qr&&qr[currentTopic])msg=t(qr[currentTopic]);
  flipped=true;
  document.getElementById('cardBack').innerHTML='<div class="question-echo">💭 "'+currentQuestion+'"</div><div class="topic-label">'+t(TOPIC_LABELS[currentTopic])+'</div><div class="card-emoji">'+currentCard.emoji+'</div><div class="card-name">'+t(currentCard.name)+'</div><div class="card-name-en">'+(LANG==='zh'?currentCard.name.en:currentCard.name.zh)+'</div><div class="card-keyword">'+t(currentCard.keywords).map(function(k){return'<span class="kw">'+k+'</span>'}).join('')+'</div><div class="card-msg">'+msg+'</div><div class="card-wish">'+t(currentCard.wish)+' ✨</div>';
  document.getElementById('cardInner').classList.add('flipped');
  var cardTheme=CARD_THEMES[currentCard.name.zh]||'';
  setTimeout(function(){applyTheme(cardTheme)},600);
  setTimeout(function(){document.getElementById('result').classList.add('show')},900);
}
function askAgain(){
  flipped=false;currentCard=null;currentQuestion='';
  applyTheme('');
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('result').classList.remove('show');
  document.getElementById('questionInput').value='';
  document.getElementById('questionInput').focus();
  window.scrollTo({top:0,behavior:'smooth'});
}
function shareCard(){
  if(!currentCard)return;var btn=document.querySelector('.share-btn');btn.textContent=t(UI.generating);btn.disabled=true;
  try{
    var W=750,H=1100,c=document.createElement('canvas');c.width=W;c.height=H;var ctx=c.getContext('2d');
    var th=CARD_THEMES[currentCard.name.zh]||'';
    var bg={sakura:['#fdf2f5','#c2628a','#4a2040'],forest:['#f5f0e8','#5a7247','#3d3427'],moon:['#0e1525','#7dabd4','#c8d4e8'],fire:['#1a0e08','#e8a44a','#f0dcc8'],star:['#f0f4fa','#4a6a9a','#2a3a5a'],rainbow:['#fef9f0','#8a5aaa','#4a3a5a'],royal:['#f8f3eb','#8a6a20','#3a2e20']};
    var colors=bg[th]||['#0f0a1a','#a78bfa','#e2e0ef'];
