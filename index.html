<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>每日一签 ✨ Daily Tarot</title>
<meta name="description" content="每天一张塔罗牌，给你满满正能量 ✨">
<meta property="og:title" content="每日一签 ✨ Daily Tarot">
<meta property="og:description" content="今天的宇宙想对你说什么？翻开你的每日塔罗牌 🔮">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0a1a;--card-bg:linear-gradient(145deg,#1a1432,#2d1f4e);
  --gold:#f5c542;--gold-soft:#fde68a;--purple:#a78bfa;--pink:#f472b6;
  --text:#e2e0ef;--text-soft:#a8a3c0;
}
body{
  font-family:'Noto Serif SC',serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(120,80,200,.08) 0%,transparent 50%),
                    radial-gradient(ellipse at 80% 20%,rgba(200,120,255,.06) 0%,transparent 50%);
}

/* Stars */
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:.8;transform:scale(1.2)}}

.container{position:relative;z-index:1;max-width:420px;width:100%;padding:2rem 1.2rem;text-align:center}

h1{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.3rem}
.subtitle{font-size:.85rem;color:var(--text-soft);margin-bottom:2rem}
.date{font-size:.78rem;color:var(--purple);margin-bottom:1.5rem;letter-spacing:2px}

/* Card */
.card-container{perspective:800px;margin:0 auto 2rem;width:260px;height:400px;cursor:pointer}
.card-inner{position:relative;width:100%;height:100%;transition:transform .8s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.card-inner.flipped{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;overflow:hidden}
.card-front{
  background:var(--card-bg);border:2px solid rgba(245,197,66,.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 0 30px rgba(167,139,250,.15),0 8px 32px rgba(0,0,0,.4);
}
.card-front .symbol{font-size:4rem;margin-bottom:1rem;animation:float 3s ease-in-out infinite}
.card-front .tap-hint{font-size:.8rem;color:var(--gold-soft);animation:pulse 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

.card-back{
  transform:rotateY(180deg);
  background:var(--card-bg);border:2px solid rgba(245,197,66,.4);
  display:flex;flex-direction:column;align-items:center;padding:1.5rem 1.2rem;
  box-shadow:0 0 40px rgba(245,197,66,.1),0 8px 32px rgba(0,0,0,.4);
}
.card-back .card-emoji{font-size:3rem;margin-bottom:.5rem}
.card-back .card-name{font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:.2rem}
.card-back .card-name-en{font-size:.75rem;color:var(--text-soft);margin-bottom:.8rem}
.card-back .card-keyword{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;margin-bottom:.8rem}
.card-back .kw{background:rgba(167,139,250,.15);color:var(--purple);padding:.2rem .6rem;border-radius:20px;font-size:.72rem}
.card-back .card-msg{font-size:.88rem;line-height:1.7;color:var(--text);flex:1;display:flex;align-items:center;text-align:center}
.card-back .card-wish{font-size:.78rem;color:var(--pink);margin-top:.6rem;font-style:italic}

/* Result area */
.result{display:none;margin-top:1rem}
.result.show{display:block;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.energy-bar{margin:1.2rem 0;text-align:left}
.energy-label{font-size:.78rem;color:var(--text-soft);margin-bottom:.4rem;display:flex;justify-content:space-between}
.energy-track{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.energy-fill{height:100%;border-radius:3px;transition:width 1.5s ease;width:0}
.energy-fill.love{background:linear-gradient(90deg,#f472b6,#fb7185)}
.energy-fill.work{background:linear-gradient(90deg,#a78bfa,#818cf8)}
.energy-fill.luck{background:linear-gradient(90deg,#fbbf24,#f59e0b)}

.affirmation{background:rgba(245,197,66,.06);border:1px solid rgba(245,197,66,.15);border-radius:12px;padding:1rem;margin:1.2rem 0;font-size:.85rem;line-height:1.7;color:var(--gold-soft)}
.affirmation::before{content:'"';font-size:1.5rem;color:var(--gold);display:block;margin-bottom:.2rem}

.lucky-items{display:flex;justify-content:center;gap:1.5rem;margin:1rem 0}
.lucky-item{text-align:center}
.lucky-item .li-icon{font-size:1.5rem;margin-bottom:.2rem}
.lucky-item .li-label{font-size:.7rem;color:var(--text-soft)}
.lucky-item .li-value{font-size:.8rem;color:var(--text);font-weight:700}

.share-btn{
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;border:none;padding:.7rem 2rem;border-radius:25px;font-size:.85rem;
  cursor:pointer;margin-top:1rem;font-family:inherit;
  box-shadow:0 4px 15px rgba(167,139,250,.3);transition:transform .2s,box-shadow .2s
}
.share-btn:active{transform:scale(.95)}

.reset-btn{background:none;border:1px solid rgba(255,255,255,.15);color:var(--text-soft);padding:.5rem 1.5rem;border-radius:20px;font-size:.78rem;cursor:pointer;margin-top:.8rem;font-family:inherit}
.reset-btn:hover{border-color:var(--purple);color:var(--purple)}

.question-box{margin-bottom:1.2rem}
.question-box input{width:100%;padding:.7rem 1rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:12px;color:var(--text);font-size:.9rem;font-family:inherit;outline:none;text-align:center}
.question-box input:focus{border-color:var(--purple);box-shadow:0 0 15px rgba(167,139,250,.15)}
.question-box input::placeholder{color:var(--text-soft)}
.question-hint{font-size:.72rem;color:var(--text-soft);margin-top:.4rem;opacity:.7}
.card-back .question-echo{font-size:.78rem;color:var(--purple);margin-bottom:.5rem;padding:.3rem .8rem;background:rgba(167,139,250,.1);border-radius:8px}
.footer{margin-top:2rem;font-size:.7rem;color:rgba(255,255,255,.2);padding-bottom:2rem}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">

  <div class="subtitle">今天的宇宙想对你说什么？</div>
  <div class="date" id="dateDisplay"></div>

  <div class="question-box" id="questionBox">
    <input type="text" id="questionInput" placeholder="💭 有心事？写下来抽专属签..." maxlength="50">
    <div class="question-hint">留空直接翻牌 = 每日一签 ✨</div>
  </div>

  <div class="card-container" id="cardContainer" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-front">
        <div class="symbol">🔮</div>
        <div class="tap-hint">✨ 轻触翻牌 ✨</div>
      </div>
      <div class="card-back" id="cardBack">
        <!-- filled by JS -->
      </div>
    </div>
  </div>

  <div class="result" id="result">
    <div class="energy-bar">
      <div class="energy-label"><span>💕 爱情能量</span><span id="lovePct"></span></div>
      <div class="energy-track"><div class="energy-fill love" id="loveFill"></div></div>

    <div class="energy-bar">

    </div>
    <div class="energy-bar">
      <div class="energy-label"><span>🍀 幸运能量</span><span id="luckPct"></span></div>
      <div class="energy-track"><div class="energy-fill luck" id="luckFill"></div></div>
    </div>

    <div class="affirmation" id="affirmation"></div>

    <div class="lucky-items">
      <div class="lucky-item"><div class="li-icon" id="luckyColorIcon">🎨</div><div class="li-label">幸运色</div><div class="li-value" id="luckyColor"></div></div>
      <div class="lucky-item"><div class="li-icon">🔢</div><div class="li-label">幸运数字</div><div class="li-value" id="luckyNum"></div></div>
      <div class="lucky-item"><div class="li-icon" id="luckyThingIcon">🌟</div><div class="li-label">幸运物</div><div class="li-value" id="luckyThing"></div></div>
    </div>

    <button class="share-btn" onclick="shareCard()">📸 保存分享</button>
    <br>
    <button class="reset-btn" id="resetBtn" onclick="resetCard()">🔄 再抽一次（明天更准哦）</button>
  </div>

  <div class="footer">✨ 每日一签 · 用正能量开启每一天</div>
</div>

function detectTopic(q){
  q = q.toLowerCase();
  if(/爱|喜欢|暗恋|表白|分手|对象|男朋友|女朋友|老公|老婆|恋爱|感情|复合|前任|约会|相亲|结婚|恋人|心动/.test(q)) return 'love';
  if(/工作|升职|加薪|跳槽|换工作|事业|老板|面试|offer|创业|辞职|职业|同事|项目/.test(q)) return 'career';
  if(/学习|考试|成绩|高考|留学|论文|毕业|读书|专业|上学|研究|备考|复习|GPA|IB/.test(q)) return 'study';
  if(/朋友|友情|闺蜜|同学|家人|父母|妈妈|爸爸|婆婆|关系|相处|吵架|矛盾|冷战/.test(q)) return 'relationship';
  return 'choice'; // default
}

// ===== DAILY SEED (same card all day for same user) =====
function getDaySeed(){
  const d = new Date();
  return d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
}
function seededRandom(seed){
  let s = seed;
  return function(){
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function generateQRCanvas(text, size){
  const qr = qrcode(0, 'M');
  qr.addData(text);
  qr.make();
  const count = qr.getModuleCount();
  const cellSize = Math.floor(size / count);
  const c = document.createElement('canvas');
  c.width = cellSize * count;
  c.height = cellSize * count;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle = '#000';
  for(let r=0;r<count;r++){
    for(let col=0;col<count;col++){
      if(qr.isDark(r,col)) ctx.fillRect(col*cellSize, r*cellSize, cellSize, cellSize);
    }
  }
  return c;
}

// roundRect polyfill for older iOS Safari
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    if(typeof r==='number') r=[r,r,r,r];
    else if(!Array.isArray(r)) r=[0,0,0,0];
    this.moveTo(x+r[0],y);
    this.lineTo(x+w-r[1],y);
    this.arcTo(x+w,y,x+w,y+r[1],r[1]);
    this.lineTo(x+w,y+h-r[2]);
    this.arcTo(x+w,y+h,x+w-r[2],y+h,r[2]);
    this.lineTo(x+r[3],y+h);
    this.arcTo(x,y+h,x,y+h-r[3],r[3]);
    this.lineTo(x,y+r[0]);
    this.arcTo(x,y,x+r[0],y,r[0]);
    this.closePath();
    return this;
  };
}

function _doShare(btn){

  const W = 750, H = 1334; // iPhone screenshot ratio
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  // Background gradient
  const grad = ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,'#0f0a1a');
  grad.addColorStop(0.5,'#1a1432');
  grad.addColorStop(1,'#0f0a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Stars
  for(let i=0;i<80;i++){
    ctx.beginPath();
    ctx.arc(Math.random()*W, Math.random()*H, Math.random()*1.5+0.5, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.5+0.1})`;
    ctx.fill();
  }

  // Helper functions
  function fillText(text, x, y, font, color, align='center', maxW=W-80){
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.fillText(text, x, y, maxW);
  }
  function wrapText(text, x, y, font, color, maxW, lineH){
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    const chars = text.split('');
    let line = '';
    let curY = y;
    for(const ch of chars){
      const test = line + ch;
      if(ctx.measureText(test).width > maxW && line){
        ctx.fillText(line, x, curY);
        line = ch;
        curY += lineH;
      } else {
        line = test;
      }
    }
    if(line) ctx.fillText(line, x, curY);
    return curY;
  }

  // Title
  fillText('✨ 每日一签 ✨', W/2, 70, 'bold 36px sans-serif', '#f5c542');

  // Date
  const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${weekdays[now.getDay()]}`;
  fillText(dateStr, W/2, 115, '20px sans-serif', '#a78bfa');

  // Card area (rounded rect)
  const cardX=120, cardY=150, cardW=510, cardH=520, cardR=20;
  ctx.strokeStyle = 'rgba(245,197,66,0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(cardX, cardY, cardW, cardH, cardR);
  ctx.stroke();
  // Card fill
  const cardGrad = ctx.createLinearGradient(cardX,cardY,cardX+cardW,cardY+cardH);
  cardGrad.addColorStop(0,'rgba(26,20,50,0.9)');
  cardGrad.addColorStop(1,'rgba(45,31,78,0.9)');
  ctx.fillStyle = cardGrad;
  ctx.beginPath();
  ctx.roundRect(cardX, cardY, cardW, cardH, cardR);
  ctx.fill();

  // Question echo (if in question mode)
  var contentStartY = 210;
  if(currentQuestion){
    fillText('💭 "' + currentQuestion + '"', W/2, 195, '18px sans-serif', '#a78bfa');
    const topicLabel = TOPIC_LABELS[detectTopic(currentQuestion)];
    fillText(topicLabel, W/2, 218, '14px sans-serif', '#a8a3c0');
    contentStartY = 245;
  }

  // Card emoji
  fillText(currentCard.emoji, W/2, contentStartY+20, '60px sans-serif', '#fff');
  // Card name
  fillText(currentCard.name, W/2, contentStartY+80, 'bold 32px sans-serif', '#f5c542');
  fillText(currentCard.en, W/2, contentStartY+110, '18px sans-serif', '#a8a3c0');

  // Keywords
  const kwStr = currentCard.keywords.join('  ·  ');
  fillText(kwStr, W/2, contentStartY+145, '18px sans-serif', '#a78bfa');

  // Message - get the right one
  var shareMsg = currentCard.msg;
  if(currentQuestion){
    const topic = detectTopic(currentQuestion);
    const qr = Q_READINGS[currentCard.name];
    if(qr && qr[topic]) shareMsg = qr[topic];
  }
  const msgEndY = wrapText(shareMsg, W/2, contentStartY+190, '22px sans-serif', '#e2e0ef', 440, 34);

  // Wish
  fillText(currentCard.wish + ' 💫', W/2, msgEndY + 45, 'italic 20px sans-serif', '#f472b6');

  // Energy bars
  let barY = 710;
  const barLabels = [
    {label:'💕 爱情能量', val:love, color:['#f472b6','#fb7185']},
    {label:'💼 事业能量', val:work, color:['#a78bfa','#818cf8']},
    {label:'🍀 幸运能量', val:luck, color:['#fbbf24','#f59e0b']},
  ];
  barLabels.forEach(b=>{
    fillText(b.label, 90, barY, '18px sans-serif', '#a8a3c0', 'left');
    fillText(b.val+'%', W-90, barY, '18px sans-serif', '#e2e0ef', 'right');
    // Track
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath(); ctx.roundRect(90, barY+10, W-180, 10, 5); ctx.fill();
    // Fill
    const bGrad = ctx.createLinearGradient(90,0,90+(W-180)*b.val/100,0);
    bGrad.addColorStop(0,b.color[0]); bGrad.addColorStop(1,b.color[1]);
    ctx.fillStyle = bGrad;
    ctx.beginPath(); ctx.roundRect(90, barY+10, (W-180)*b.val/100, 10, 5); ctx.fill();
    barY += 55;
  });

  // Affirmation box
  const affY = barY + 15;
  ctx.fillStyle = 'rgba(245,197,66,0.06)';
  ctx.strokeStyle = 'rgba(245,197,66,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(70, affY, W-140, 70, 12); ctx.fill(); ctx.stroke();
  fillText('" ' + todayAffirm, W/2, affY+42, '22px sans-serif', '#fde68a');

  // Lucky items
  const luckyY = affY + 100;
  fillText(todayColor.icon + ' 幸运色', W/2-200, luckyY, '16px sans-serif', '#a8a3c0');
  fillText(todayColor.name, W/2-200, luckyY+28, 'bold 20px sans-serif', '#e2e0ef');
  fillText('🔢 幸运数字', W/2, luckyY, '16px sans-serif', '#a8a3c0');
  fillText(String(todayNum), W/2, luckyY+28, 'bold 20px sans-serif', '#e2e0ef');
  fillText(todayThing.icon + ' 幸运物', W/2+200, luckyY, '16px sans-serif', '#a8a3c0');
  fillText(todayThing.name, W/2+200, luckyY+28, 'bold 20px sans-serif', '#e2e0ef');

  // QR Code (local generation, no network needed)
  const siteUrl = 'https://tarot.1yong.com';
  const qrCanvas = generateQRCanvas(siteUrl, 120);
  const qrY = luckyY + 80;
  // White background for QR
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.roundRect(W/2-65, qrY-5, 130, 130, 8); ctx.fill();
  ctx.drawImage(qrCanvas, W/2-60, qrY, 120, 120);
  fillText('长按识别二维码 · 抽你的每日一签', W/2, qrY+148, '16px sans-serif', 'rgba(255,255,255,0.4)');

  // Convert to blob and share/download
  c.toBlob((blob)=>{
    const file = new File([blob], 'daily-tarot.png', {type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file], title:'每日一签 ✨'}).catch(()=>{});
    } else {
      // Fallback: download
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'daily-tarot.png';
      a.click();
      URL.revokeObjectURL(a.href);
    }
    btn.textContent = '📸 保存分享';
    btn.disabled = false;
  }, 'image/png');
}
</script>
