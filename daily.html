<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>每日一签 ✨</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue','Segoe UI',Roboto,sans-serif;background:#fcfbff;color:#1e1930;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
.container{max-width:420px;width:100%;padding:2rem 1.2rem;text-align:center}
.back-link{display:inline-block;color:#a098b8;font-size:.8rem;text-decoration:none;margin-bottom:1rem;padding:.3rem .8rem;border:1px solid rgba(140,120,180,.15);border-radius:15px}
.back-link:hover{border-color:rgba(140,120,180,.35);color:#6a5a90}
h1{font-size:1.5rem;font-weight:700;color:#2a2045;margin-bottom:.3rem}
.subtitle{font-size:.85rem;color:#8a80a0;margin-bottom:1.5rem}
.date{font-size:.78rem;color:#b5aec8;margin-bottom:1.5rem;letter-spacing:2px}
.card-container{perspective:800px;margin:0 auto 2rem;width:260px;height:400px;cursor:pointer}
.card-inner{position:relative;width:100%;height:100%;transition:transform .8s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.card-inner.flipped{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;overflow:hidden}
.card-front{background:#f8f6ff;border:1px solid rgba(140,120,180,.15);display:flex;flex-direction:column;align-items:center;justify-content:center}
.card-front .symbol{font-size:4rem;margin-bottom:1rem;animation:float 3s ease-in-out infinite}
.card-front .tap-hint{font-size:.8rem;color:#a098b8;animation:pulse 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.card-back{transform:rotateY(180deg);background:#f8f6ff;border:1px solid rgba(140,120,180,.18);display:flex;flex-direction:column;align-items:center;padding:1.5rem 1.2rem}
.card-back .card-emoji{font-size:3rem;margin-bottom:.5rem}
.card-back .card-name{font-size:1.1rem;font-weight:700;color:#2a2045;margin-bottom:.2rem}
.card-back .card-name-en{font-size:.75rem;color:#a098b8;margin-bottom:.8rem}
.card-back .card-keyword{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;margin-bottom:.8rem}
.card-back .kw{background:rgba(140,120,180,.08);color:#6a5a90;padding:.2rem .6rem;border-radius:20px;font-size:.72rem}
.card-back .card-msg{font-size:.88rem;line-height:1.7;color:#3a3050;flex:1;display:flex;align-items:center;text-align:center}
.card-back .card-wish{font-size:.78rem;color:#a088b8;margin-top:.6rem;font-style:italic}
.result{display:none;margin-top:1rem}
.result.show{display:block;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.energy-bar{margin:1.2rem 0;text-align:left}
.energy-label{font-size:.78rem;color:#8a80a0;margin-bottom:.4rem;display:flex;justify-content:space-between}
.energy-track{height:5px;background:rgba(140,120,180,.06);border-radius:3px;overflow:hidden}
.energy-fill{height:100%;border-radius:3px;transition:width 1.5s ease;width:0}
.energy-fill.love{background:linear-gradient(90deg,#d4a0c0,#e8b8d4)}
.energy-fill.work{background:linear-gradient(90deg,#8898c8,#a0b0e0)}
.energy-fill.luck{background:linear-gradient(90deg,#88c4a0,#a8dcc0)}
.affirmation{background:rgba(140,120,180,.04);border:1px solid rgba(140,120,180,.1);border-radius:12px;padding:1rem;margin:1.2rem 0;font-size:.85rem;line-height:1.7;color:#5a4a78;text-align:center}
.lucky-items{display:flex;justify-content:center;gap:1.5rem;margin:1rem 0}
.lucky-item{text-align:center}
.lucky-item .li-icon{font-size:1.5rem;margin-bottom:.2rem}
.lucky-item .li-label{font-size:.7rem;color:#a098b8}
.lucky-item .li-value{font-size:.8rem;color:#2a2045;font-weight:700}
.share-btn{background:#6a5a90;color:#fff;border:none;padding:.7rem 2rem;border-radius:25px;font-size:.85rem;cursor:pointer;margin-top:1rem;font-family:inherit}
.share-btn:active{transform:scale(.95)}
.footer{margin-top:2rem;font-size:.7rem;color:#c5c0d5;padding-bottom:2rem}
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="index.html" id="backLink"></a>
  <h1 id="pageTitle"></h1>
  <div class="subtitle" id="pageSub"></div>
  <div class="date" id="dateDisplay"></div>
  <div class="card-container" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-front">
        <div class="symbol">🔮</div>
        <div class="tap-hint" id="tapHint"></div>
      </div>
      <div class="card-back" id="cardBack"></div>
    </div>
  </div>
  <div class="result" id="result">
    <div class="energy-bar"><div class="energy-label"><span id="loveLabel"></span><span id="lovePct"></span></div><div class="energy-track"><div class="energy-fill love" id="loveFill"></div></div></div>
    <div class="energy-bar"><div class="energy-label"><span id="workLabel"></span><span id="workPct"></span></div><div class="energy-track"><div class="energy-fill work" id="workFill"></div></div></div>
    <div class="energy-bar"><div class="energy-label"><span id="luckLabel"></span><span id="luckPct"></span></div><div class="energy-track"><div class="energy-fill luck" id="luckFill"></div></div></div>
    <div class="affirmation" id="affirmation"></div>
    <div class="lucky-items">
      <div class="lucky-item"><div class="li-icon" id="luckyColorIcon"></div><div class="li-label" id="colorLabel"></div><div class="li-value" id="luckyColor"></div></div>
      <div class="lucky-item"><div class="li-icon">🔢</div><div class="li-label" id="numLabel"></div><div class="li-value" id="luckyNum"></div></div>
      <div class="lucky-item"><div class="li-icon" id="luckyThingIcon"></div><div class="li-label" id="thingLabel"></div><div class="li-value" id="luckyThing"></div></div>
    </div>
    <button class="share-btn" onclick="shareCard()"></button>
  </div>
  <div class="footer" id="footerText"></div>
</div>
<script src="qr.min.js"></script>
<script src="cards.js"></script>
<script>
var seed=getDaySeed(),rng=seededRandom(seed);
var todayCard=CARDS[Math.floor(rng()*CARDS.length)];
var todayAffirm=AFFIRMATIONS[Math.floor(rng()*AFFIRMATIONS.length)];
var todayColor=COLORS[Math.floor(rng()*COLORS.length)];
var todayNum=Math.floor(rng()*9)+1;
var todayThing=THINGS[Math.floor(rng()*THINGS.length)];
var love=Math.floor(rng()*25)+75,work=Math.floor(rng()*25)+75,luck=Math.floor(rng()*25)+75;
var now=new Date(),weekdays=['日','一','二','三','四','五','六'];

if(LANG==='en'){var ms=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];var ds=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];document.getElementById('dateDisplay').textContent=ds[now.getDay()]+', '+ms[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear()}else{document.getElementById('dateDisplay').textContent=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 星期'+weekdays[now.getDay()]}
document.getElementById('backLink').textContent=t(UI.back);
document.getElementById('pageTitle').textContent=t(UI.daily_h1);
document.getElementById('pageSub').textContent=t(UI.daily_sub);
document.getElementById('tapHint').textContent=t(UI.tap_hint);
document.getElementById('loveLabel').textContent=t(UI.love_energy);
document.getElementById('workLabel').textContent=t(UI.work_energy);
document.getElementById('luckLabel').textContent=t(UI.luck_energy);
document.getElementById('colorLabel').textContent=t(UI.lucky_color);
document.getElementById('numLabel').textContent=t(UI.lucky_num);
document.getElementById('thingLabel').textContent=t(UI.lucky_thing);
document.querySelector('.share-btn').textContent=t(UI.share_btn);
document.getElementById('footerText').textContent=t(UI.footer_daily);

var flipped=false;
function flipCard(){
  if(flipped) return;flipped=true;
  document.getElementById('cardBack').innerHTML='<div class="card-emoji">'+todayCard.emoji+'</div><div class="card-name">'+t(todayCard.name)+'</div><div class="card-name-en">'+(LANG==='zh'?todayCard.name.en:todayCard.name.zh)+'</div><div class="card-keyword">'+t(todayCard.keywords).map(function(k){return'<span class="kw">'+k+'</span>'}).join('')+'</div><div class="card-msg">'+t(todayCard.msg)+'</div><div class="card-wish">'+t(todayCard.wish)+' ✨</div>';
  document.getElementById('cardInner').classList.add('flipped');
  setTimeout(function(){
    document.getElementById('result').classList.add('show');
    setTimeout(function(){
      document.getElementById('loveFill').style.width=love+'%';document.getElementById('lovePct').textContent=love+'%';
      document.getElementById('workFill').style.width=work+'%';document.getElementById('workPct').textContent=work+'%';
      document.getElementById('luckFill').style.width=luck+'%';document.getElementById('luckPct').textContent=luck+'%';
    },200);
    document.getElementById('affirmation').textContent=t(todayAffirm);
    document.getElementById('luckyColor').textContent=t(todayColor.name);document.getElementById('luckyColorIcon').textContent=todayColor.icon;
    document.getElementById('luckyNum').textContent=todayNum;
    document.getElementById('luckyThing').textContent=t(todayThing.name);document.getElementById('luckyThingIcon').textContent=todayThing.icon;
  },900);
}
function shareCard(){
  var btn=document.querySelector('.share-btn');btn.textContent=t(UI.generating);btn.disabled=true;
  try{
    var S=2,w=660,h=1000,W=w*S,H=h*S,c=document.createElement('canvas');c.width=W;c.height=H;var ctx=c.getContext('2d');
    ctx.scale(S,S);
    ctx.fillStyle='#fdfcff';ctx.fillRect(0,0,w,h);
    function ft(tx,x,y,f,co,a){ctx.font=f;ctx.fillStyle=co;ctx.textAlign=a||'center';ctx.fillText(tx,x,y,w-100)}
    function wt(tx,x,y,f,co,mw,lh){ctx.font=f;ctx.fillStyle=co;ctx.textAlign='center';var ch=tx.split(''),line='',cy=y;for(var j=0;j<ch.length;j++){var test=line+ch[j];if(ctx.measureText(test).width>mw&&line){ctx.fillText(line,x,cy);line=ch[j];cy+=lh}else line=test}if(line)ctx.fillText(line,x,cy);return cy}
    var dateStr=LANG==='en'?['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()]+' '+now.getDate()+', '+now.getFullYear():now.getFullYear()+'.'+(now.getMonth()+1)+'.'+now.getDate();
    // --- measure content height first ---
    ctx.font='18px sans-serif';var msgText=t(todayCard.msg);var msgLines=[];var ml='';var mch=msgText.split('');for(var mi=0;mi<mch.length;mi++){var mt=ml+mch[mi];if(ctx.measureText(mt).width>440&&ml){msgLines.push(ml);ml=mch[mi]}else ml=mt}if(ml)msgLines.push(ml);
    var contentH=12+80+48+90+44+38+20+34+40+(msgLines.length*42)+50+32+55+12+20;
    var availH=h-90;
    var cy=Math.max(50,Math.floor((availH-contentH)/2));
    // --- draw centered, generous spacing ---
    ft(dateStr,w/2,cy,'12px sans-serif','rgba(195,190,215,1)');cy+=80;
    ft(todayCard.emoji,w/2,cy,'48px sans-serif','#000');cy+=90;
    ft(t(todayCard.name),w/2,cy,'bold 32px sans-serif','#2a2a48');cy+=44;
    ft(LANG==='zh'?todayCard.name.en:todayCard.name.zh,w/2,cy,'13px sans-serif','rgba(175,168,198,1)');cy+=38;
    ft(t(todayCard.keywords).join('  ·  '),w/2,cy,'12px sans-serif','rgba(195,190,215,1)');cy+=34;
    ctx.strokeStyle='rgba(235,230,248,1)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(180,cy);ctx.lineTo(w-180,cy);ctx.stroke();cy+=40;
    var ey=wt(t(todayCard.msg),w/2,cy,'18px sans-serif','#3a3058',440,42);cy=ey+38;
    var pw=Math.min(400,w-80);
    ctx.fillStyle='rgba(246,243,253,1)';ctx.beginPath();ctx.roundRect(w/2-pw/2,cy-16,pw,32,16);ctx.fill();
    ctx.textBaseline='middle';ft('✨ '+t(todayCard.wish),w/2,cy,'15px sans-serif','rgba(140,125,170,1)');ctx.textBaseline='alphabetic';cy+=55;
    ft('💕 '+love+'%    💼 '+work+'%    🍀 '+luck+'%',w/2,cy,'12px sans-serif','rgba(200,195,218,1)');
    // QR at bottom
    var qrc=generateQRCanvas('https://meltflake.com/tarot-daily',96);
    var qy=h-150;ctx.globalAlpha=0.92;ctx.drawImage(qrc,w/2-24,qy,48,48);ctx.globalAlpha=1;
    ft(LANG==='zh'?'长按识别 · 抽你的每日一签':'Scan · Draw your daily tarot',w/2,qy+62,'11px sans-serif','rgba(218,214,232,1)');
    showShareModal(c.toDataURL('image/png'));
    btn.textContent=t(UI.share_btn);btn.disabled=false;
  }catch(e){alert(t(UI.share_fail)+e.message);btn.textContent=t(UI.share_btn);btn.disabled=false}
}
</script>
</body>
</html>
