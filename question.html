<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>心事求签 🔮</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue','Segoe UI',Roboto,sans-serif;background:#fcfbff;color:#1e1930;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
.container{max-width:420px;width:100%;padding:2rem 1.2rem;text-align:center}
.back-link{display:inline-block;color:#a098b8;font-size:.8rem;text-decoration:none;margin-bottom:1rem;padding:.3rem .8rem;border:1px solid rgba(140,120,180,.15);border-radius:15px}
.back-link:hover{border-color:rgba(140,120,180,.35);color:#6a5a90}
h1{font-size:1.5rem;font-weight:700;color:#2a2045;margin-bottom:.3rem}
.subtitle{font-size:.85rem;color:#8a80a0;margin-bottom:1.5rem}
.question-area{margin-bottom:1.5rem}
.question-area input{width:100%;padding:.8rem 1rem;background:#f8f6ff;border:1px solid rgba(140,120,180,.15);border-radius:12px;color:#1e1930;font-size:.95rem;font-family:inherit;outline:none;text-align:center}
.question-area input:focus{border-color:rgba(140,120,180,.4);box-shadow:0 0 12px rgba(140,120,180,.08)}
.question-area input::placeholder{color:#b5aec8}
.question-hint{font-size:.72rem;color:#b5aec8;margin-top:.5rem}
.card-container{perspective:800px;margin:0 auto 2rem;width:260px;height:400px;cursor:pointer}
.card-inner{position:relative;width:100%;height:100%;transition:transform 1.2s cubic-bezier(.25,.1,.25,1);transform-style:preserve-3d}
.card-inner.flipped{transform:rotateY(180deg) scale(1.02)}
.card-inner.flipping{animation:flipBounce 1.2s ease forwards}
@keyframes flipBounce{
  0%{transform:rotateY(0deg) scale(1)}
  40%{transform:rotateY(100deg) scale(.95)}
  70%{transform:rotateY(190deg) scale(1.04)}
  85%{transform:rotateY(177deg) scale(1.01)}
  100%{transform:rotateY(180deg) scale(1)}
}
.card-front,.card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;overflow:hidden}
.card-front{background:#f8f6ff;border:1px solid rgba(140,120,180,.15);display:flex;flex-direction:column;align-items:center;justify-content:center}
.card-front .symbol{font-size:4rem;margin-bottom:1rem;animation:float 3s ease-in-out infinite;transition:all .6s ease}
.card-front .tap-hint{font-size:.8rem;color:#a098b8;animation:pulse 2s ease-in-out infinite;transition:opacity .3s}
.card-front .ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);width:80px;height:80px;border-radius:50%;opacity:0;pointer-events:none;
  background:radial-gradient(circle,rgba(180,160,240,.15) 0%,rgba(200,180,255,.08) 40%,transparent 70%)}
.card-front.activating .symbol{animation:none!important}
.card-front.activating .tap-hint{opacity:0}
.card-front.activating .ring{animation:ringPulse 2s ease-out forwards}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes ringPulse{
  0%{opacity:0;width:50px;height:50px}
  15%{opacity:.9;width:80px;height:80px;box-shadow:0 0 20px rgba(180,160,240,.3)}
  60%{opacity:.4;width:180px;height:180px;box-shadow:0 0 40px rgba(200,180,255,.15)}
  100%{opacity:0;width:240px;height:240px;box-shadow:none}
}
.card-back{transform:rotateY(180deg);background:#f8f6ff;border:1px solid rgba(140,120,180,.18);display:flex;flex-direction:column;align-items:center;padding:1.2rem 1rem}
.card-back .question-echo{font-size:.76rem;color:#6a5a90;margin-bottom:.3rem;padding:.25rem .7rem;background:rgba(140,120,180,.06);border-radius:8px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-back .topic-label{font-size:.7rem;color:#a088b8;margin-bottom:.5rem}
.card-back .card-emoji{font-size:2.5rem;margin-bottom:.3rem}
.card-back .card-name{font-size:1rem;font-weight:700;color:#2a2045;margin-bottom:.15rem}
.card-back .card-name-en{font-size:.7rem;color:#a098b8;margin-bottom:.5rem}
.card-back .card-keyword{display:flex;gap:.3rem;flex-wrap:wrap;justify-content:center;margin-bottom:.6rem}
.card-back .kw{background:rgba(140,120,180,.08);color:#6a5a90;padding:.15rem .5rem;border-radius:20px;font-size:.68rem}
.card-back .card-msg{font-size:.85rem;line-height:1.7;color:#3a3050;flex:1;display:flex;align-items:center;text-align:center}
.card-back .card-wish{font-size:.75rem;color:#a088b8;margin-top:.4rem;font-style:italic}
.result{display:none;margin-top:1rem}
.result.show{display:block;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.again-btn{background:#6a5a90;color:#fff;border:none;padding:.7rem 2rem;border-radius:25px;font-size:.88rem;cursor:pointer;font-family:inherit;margin-top:.5rem}
.again-btn:active{transform:scale(.95)}
.share-btn{background:rgba(140,120,180,.06);border:1px solid rgba(140,120,180,.15);color:#8a80a0;padding:.5rem 1.5rem;border-radius:20px;font-size:.82rem;cursor:pointer;margin-top:.8rem;font-family:inherit}
.share-btn:active{transform:scale(.95)}
.footer{margin-top:2rem;font-size:.7rem;color:#c5c0d5;padding-bottom:2rem}
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="index.html" id="backLink"></a>
  <h1 id="pageTitle"></h1>
  <div class="subtitle" id="pageSub"></div>
  <div class="question-area">
    <input type="text" id="questionInput" placeholder="" maxlength="50" autofocus>
    <div class="question-hint" id="questionHint"></div>
  </div>
  <div class="card-container" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-front">
        <div class="ring"></div>
        <div class="symbol">🔮</div>
        <div class="tap-hint" id="tapHint"></div>
      </div>
      <div class="card-back" id="cardBack"></div>
    </div>
  </div>
  <div class="result" id="result">
    <button class="again-btn" onclick="askAgain()" id="againBtn"></button><br>
    <button class="share-btn" onclick="shareCard()" id="shareBtn"></button>
  </div>
  <div class="footer" id="footerText"></div>
</div>
<script src="qr.min.js"></script>
<script src="cards.js"></script>
<script>
var seed=getDaySeed(),flipped=false,currentCard=null,currentQuestion='',currentTopic='',now=new Date();
document.getElementById('backLink').textContent=t(UI.back);
document.getElementById('pageTitle').textContent=t(UI.question_h1);
document.getElementById('pageSub').textContent=t(UI.question_sub);
document.getElementById('questionInput').placeholder=t(UI.question_ph);
document.getElementById('questionHint').textContent=t(UI.question_hint);
document.getElementById('tapHint').textContent=t(UI.question_tap);
document.getElementById('againBtn').textContent=t(UI.ask_again);
document.getElementById('shareBtn').textContent=t(UI.share_btn);
document.getElementById('footerText').textContent=t(UI.footer_question);

function flipCard(){
  if(flipped){askAgain();return}
  var q=document.getElementById('questionInput').value.trim();
  if(!q){var inp=document.getElementById('questionInput');inp.style.borderColor='#c4a0d0';inp.placeholder=t(UI.question_empty);inp.focus();setTimeout(function(){inp.style.borderColor='';inp.placeholder=t(UI.question_ph)},2000);return}
  currentQuestion=q;currentTopic=detectTopic(q);
  var hash=0;for(var i=0;i<q.length;i++)hash=((hash<<5)-hash)+q.charCodeAt(i)+seed;hash=Math.abs(hash);
  currentCard=CARDS[hash%CARDS.length];
  var msg=t(currentCard.msg);var qr=Q_READINGS[currentCard.name.zh];if(qr&&qr[currentTopic])msg=t(qr[currentTopic]);
  flipped=true;
  document.querySelector('.card-front').classList.add('activating');
  document.getElementById('cardBack').innerHTML='<div class="question-echo">💭 "'+currentQuestion+'"</div><div class="topic-label">'+t(TOPIC_LABELS[currentTopic])+'</div><div class="card-emoji">'+currentCard.emoji+'</div><div class="card-name">'+t(currentCard.name)+'</div><div class="card-name-en">'+(LANG==='zh'?currentCard.name.en:currentCard.name.zh)+'</div><div class="card-keyword">'+t(currentCard.keywords).map(function(k){return'<span class="kw">'+k+'</span>'}).join('')+'</div><div class="card-msg">'+msg+'</div><div class="card-wish">'+t(currentCard.wish)+' ✨</div>';
  setTimeout(function(){var ci=document.getElementById('cardInner');ci.classList.add('flipping');ci.addEventListener('animationend',function(){ci.classList.remove('flipping');ci.classList.add('flipped')},{once:true})},1000);
  setTimeout(function(){document.getElementById('result').classList.add('show')},1900);
}
function askAgain(){flipped=false;currentCard=null;currentQuestion='';var ci=document.getElementById('cardInner');ci.classList.remove('flipped','flipping');ci.style.transition='none';ci.style.transform='rotateY(0deg) scale(1)';ci.offsetHeight;ci.style.transition='';ci.style.transform='';document.querySelector('.card-front').classList.remove('activating');document.getElementById('result').classList.remove('show');var si=document.getElementById('shareImg');if(si)si.remove();var st=document.getElementById('shareTip');if(st)st.remove();document.getElementById('questionInput').value='';document.getElementById('questionInput').focus();window.scrollTo({top:0,behavior:'smooth'})}

function shareCard(){
  if(!currentCard)return;var btn=document.querySelector('.share-btn');btn.textContent=t(UI.generating);btn.disabled=true;
  try{
    var S=2,w=660,h=1000,W=w*S,H=h*S,c=document.createElement('canvas');c.width=W;c.height=H;var ctx=c.getContext('2d');
    ctx.scale(S,S);
    ctx.fillStyle='#fdfcff';ctx.fillRect(0,0,w,h);
    function ft(tx,x,y,f,co,a){ctx.font=f;ctx.fillStyle=co;ctx.textAlign=a||'center';ctx.fillText(tx,x,y,w-100)}
    function wt(tx,x,y,f,co,mw,lh){ctx.font=f;ctx.fillStyle=co;ctx.textAlign='center';var ch=tx.split(''),line='',cy=y;for(var j=0;j<ch.length;j++){var test=line+ch[j];if(ctx.measureText(test).width>mw&&line){ctx.fillText(line,x,cy);line=ch[j];cy+=lh}else line=test}if(line)ctx.fillText(line,x,cy);return cy}
    var qText=currentQuestion.length>20?currentQuestion.slice(0,20)+'…':currentQuestion;
    // --- measure content height ---
    var rmsg=t(currentCard.msg);var qr=Q_READINGS[currentCard.name.zh];if(qr&&qr[currentTopic])rmsg=t(qr[currentTopic]);
    ctx.font='18px sans-serif';var msgLines=[];var ml='';var mch=rmsg.split('');for(var mi=0;mi<mch.length;mi++){var mt=ml+mch[mi];if(ctx.measureText(mt).width>440&&ml){msgLines.push(ml);ml=mch[mi]}else ml=mt}if(ml)msgLines.push(ml);
    var contentH=14+35+48+90+44+38+20+34+40+(msgLines.length*42)+50+32;
    var availH=h-90;
    var cy=Math.max(50,Math.floor((availH-contentH)/2));
    // --- draw centered, generous spacing ---
    ft('💭 '+qText,w/2,cy,'14px sans-serif','rgba(195,190,215,1)');cy+=35;
    ft(t(TOPIC_LABELS[currentTopic]),w/2,cy,'13px sans-serif','rgba(210,205,225,1)');cy+=65;
    ft(currentCard.emoji,w/2,cy,'48px sans-serif','#000');cy+=90;
    ft(t(currentCard.name),w/2,cy,'bold 32px sans-serif','#2a2a48');cy+=44;
    ft(LANG==='zh'?currentCard.name.en:currentCard.name.zh,w/2,cy,'13px sans-serif','rgba(175,168,198,1)');cy+=38;
    ft(t(currentCard.keywords).join('  ·  '),w/2,cy,'12px sans-serif','rgba(195,190,215,1)');cy+=34;
    ctx.strokeStyle='rgba(235,230,248,1)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(180,cy);ctx.lineTo(w-180,cy);ctx.stroke();cy+=40;
    var ey=wt(rmsg,w/2,cy,'18px sans-serif','#3a3058',440,42);cy=ey+50;
    var pw=Math.min(400,w-80);
    ctx.fillStyle='rgba(246,243,253,1)';ctx.beginPath();ctx.roundRect(w/2-pw/2,cy-16,pw,32,16);ctx.fill();
    ctx.textBaseline='middle';ft('✨ '+t(currentCard.wish),w/2,cy,'15px sans-serif','rgba(140,125,170,1)');ctx.textBaseline='alphabetic';
    // QR at bottom
    var qrc=generateQRCanvas('https://meltflake.com/tarot-daily',96);
    var qy=h-150;ctx.globalAlpha=0.92;ctx.drawImage(qrc,w/2-24,qy,48,48);ctx.globalAlpha=1;
    ft(LANG==='zh'?'长按识别 · 问问你的心事':'Scan · Ask your heart',w/2,qy+62,'11px sans-serif','rgba(218,214,232,1)');
    showShareModal(c.toDataURL('image/png'));
    btn.textContent=t(UI.share_btn);btn.disabled=false;
  }catch(e){alert(t(UI.share_fail)+e.message);btn.textContent=t(UI.share_btn);btn.disabled=false}
}
</script>
</body>
</html>
