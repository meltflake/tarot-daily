<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>每日一签 🌿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f0e8;--card-bg:#fffdf7;--accent:#5a7247;--accent-light:#8fa97a;--gold:#b8860b;--brown:#6b4f3a;--text:#3d3427;--text-soft:#7a6e5d;--leaf:#92b06a;--bark:#a0845c;--pink:#c77dba;--blue:#6a8caf}
body{font-family:'Noto Serif SC',serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2392b06a' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.leaves{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.leaf{position:absolute;font-size:1.2rem;opacity:.25;animation:fall var(--d,8s) linear infinite var(--delay,0s)}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:0}10%{opacity:.25}90%{opacity:.25}100%{transform:translateY(calc(100vh + 20px)) rotate(360deg);opacity:0}}
.container{position:relative;z-index:1;max-width:420px;width:100%;padding:2rem 1.2rem;text-align:center}
.back-link{display:inline-block;color:var(--text-soft);font-size:.8rem;text-decoration:none;margin-bottom:1rem;padding:.3rem .8rem;border:1px solid rgba(90,114,71,.2);border-radius:15px;background:rgba(255,255,255,.5)}
.back-link:hover{border-color:var(--accent);color:var(--accent)}
h1{font-size:1.5rem;font-weight:700;color:var(--accent);margin-bottom:.3rem}
.subtitle{font-size:.85rem;color:var(--text-soft);margin-bottom:1.5rem}
.date{font-size:.78rem;color:var(--accent-light);margin-bottom:1.5rem;letter-spacing:2px}
.card-container{perspective:800px;margin:0 auto 2rem;width:260px;height:400px;cursor:pointer}
.card-inner{position:relative;width:100%;height:100%;transition:transform .8s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.card-inner.flipped{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;overflow:hidden}
.card-front{background:var(--card-bg);border:2px solid rgba(146,176,106,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(90,114,71,.1)}
.card-front .symbol{font-size:4rem;margin-bottom:1rem;animation:float 3s ease-in-out infinite}
.card-front .tap-hint{font-size:.8rem;color:var(--accent-light);animation:pulse 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.card-back{transform:rotateY(180deg);background:var(--card-bg);border:2px solid rgba(146,176,106,.35);display:flex;flex-direction:column;align-items:center;padding:1.5rem 1.2rem;box-shadow:0 4px 25px rgba(90,114,71,.12)}
.card-back .card-emoji{font-size:3rem;margin-bottom:.5rem}
.card-back .card-name{font-size:1.1rem;font-weight:700;color:var(--accent);margin-bottom:.2rem}
.card-back .card-name-en{font-size:.75rem;color:var(--text-soft);margin-bottom:.8rem}
.card-back .card-keyword{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;margin-bottom:.8rem}
.card-back .kw{background:rgba(146,176,106,.15);color:var(--accent);padding:.2rem .6rem;border-radius:20px;font-size:.72rem}
.card-back .card-msg{font-size:.88rem;line-height:1.7;color:var(--text);flex:1;display:flex;align-items:center;text-align:center}
.card-back .card-wish{font-size:.78rem;color:var(--pink);margin-top:.6rem;font-style:italic}
.result{display:none;margin-top:1rem}
.result.show{display:block;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.energy-bar{margin:1.2rem 0;text-align:left}
.energy-label{font-size:.78rem;color:var(--text-soft);margin-bottom:.4rem;display:flex;justify-content:space-between}
.energy-track{height:6px;background:rgba(146,176,106,.1);border-radius:3px;overflow:hidden}
.energy-fill{height:100%;border-radius:3px;transition:width 1.5s ease;width:0}
.energy-fill.love{background:linear-gradient(90deg,#c77dba,#e0a4d4)}
.energy-fill.work{background:linear-gradient(90deg,#6a8caf,#92b5d4)}
.energy-fill.luck{background:linear-gradient(90deg,#92b06a,#b8d48a)}
.affirmation{background:rgba(146,176,106,.06);border:1px solid rgba(146,176,106,.2);border-radius:12px;padding:1rem;margin:1.2rem 0;font-size:.85rem;line-height:1.7;color:var(--brown)}
.affirmation::before{content:'"';font-size:1.5rem;color:var(--accent);display:block;margin-bottom:.2rem}
.lucky-items{display:flex;justify-content:center;gap:1.5rem;margin:1rem 0}
.lucky-item{text-align:center}
.lucky-item .li-icon{font-size:1.5rem;margin-bottom:.2rem}
.lucky-item .li-label{font-size:.7rem;color:var(--text-soft)}
.lucky-item .li-value{font-size:.8rem;color:var(--text);font-weight:700}
.share-btn{background:var(--accent);color:#fff;border:none;padding:.7rem 2rem;border-radius:25px;font-size:.85rem;cursor:pointer;margin-top:1rem;font-family:inherit;box-shadow:0 4px 15px rgba(90,114,71,.2)}
.share-btn:active{transform:scale(.95)}
.footer{margin-top:2rem;font-size:.7rem;color:var(--bark);opacity:.3;padding-bottom:2rem}
</style>
</head>
<body>
<div class="leaves" id="leaves"></div>
<div class="container">
  <a class="back-link" href="index.html" id="backLink">← 返回</a>
  <h1 id="pageTitle">🌿 每日一签</h1>
  <div class="subtitle" id="pageSub"></div>
  <div class="date" id="dateDisplay"></div>
  <div class="card-container" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-front">
        <div class="symbol">🌿</div>
        <div class="tap-hint" id="tapHint">✨ 轻触翻牌 ✨</div>
      </div>
      <div class="card-back" id="cardBack"></div>
    </div>
  </div>
  <div class="result" id="result">
    <div class="energy-bar"><div class="energy-label"><span id="loveLabel">💕 爱情能量</span><span id="lovePct"></span></div><div class="energy-track"><div class="energy-fill love" id="loveFill"></div></div></div>
    <div class="energy-bar"><div class="energy-label"><span id="workLabel">💼 事业能量</span><span id="workPct"></span></div><div class="energy-track"><div class="energy-fill work" id="workFill"></div></div></div>
    <div class="energy-bar"><div class="energy-label"><span id="luckLabel">🍀 幸运能量</span><span id="luckPct"></span></div><div class="energy-track"><div class="energy-fill luck" id="luckFill"></div></div></div>
    <div class="affirmation" id="affirmation"></div>
    <div class="lucky-items">
      <div class="lucky-item"><div class="li-icon" id="luckyColorIcon">🎨</div><div class="li-label" id="colorLabel"></div><div class="li-value" id="luckyColor"></div></div>
      <div class="lucky-item"><div class="li-icon">🔢</div><div class="li-label" id="numLabel"></div><div class="li-value" id="luckyNum"></div></div>
      <div class="lucky-item"><div class="li-icon" id="luckyThingIcon">🌟</div><div class="li-label" id="thingLabel"></div><div class="li-value" id="luckyThing"></div></div>
    </div>
    <button class="share-btn" onclick="shareCard()">📸 保存分享</button>
  </div>
  <div class="footer" id="footerText"></div>
</div>
<script src="qr.min.js"></script>
<script src="cards.js"></script>
<script>
// Leaves
(function(){var e=document.getElementById('leaves');var em=['🍃','🌿','🍂','🌱','☘️'];for(var i=0;i<12;i++){var s=document.createElement('div');s.className='leaf';s.textContent=em[Math.floor(Math.random()*em.length)];s.style.cssText='left:'+Math.random()*100+'%;font-size:'+(0.8+Math.random()*1)+'rem;--d:'+(6+Math.random()*8)+'s;--delay:'+Math.random()*8+'s';e.appendChild(s)}})();

var seed=getDaySeed(),rng=seededRandom(seed);
var todayCard=CARDS[Math.floor(rng()*CARDS.length)];
var todayAffirm=AFFIRMATIONS[Math.floor(rng()*AFFIRMATIONS.length)];
var todayColor=COLORS[Math.floor(rng()*COLORS.length)];
var todayNum=Math.floor(rng()*9)+1;
var todayThing=THINGS[Math.floor(rng()*THINGS.length)];
var love=Math.floor(rng()*25)+75,work=Math.floor(rng()*25)+75,luck=Math.floor(rng()*25)+75;
var now=new Date(),weekdays=['日','一','二','三','四','五','六'];

if(LANG==='en'){var ms=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];var ds=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];document.getElementById('dateDisplay').textContent=ds[now.getDay()]+', '+ms[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear()}else{document.getElementById('dateDisplay').textContent=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 星期'+weekdays[now.getDay()]}
document.getElementById('backLink').textContent=t(UI.back);
document.getElementById('pageTitle').textContent='🌿 '+t(UI.daily_title);
document.getElementById('pageSub').textContent=t(UI.daily_sub);
document.getElementById('tapHint').textContent=t(UI.tap_hint);
document.getElementById('loveLabel').textContent=t(UI.love_energy);
document.getElementById('workLabel').textContent=t(UI.work_energy);
document.getElementById('luckLabel').textContent=t(UI.luck_energy);
document.getElementById('colorLabel').textContent=t(UI.lucky_color);
document.getElementById('numLabel').textContent=t(UI.lucky_num);
document.getElementById('thingLabel').textContent=t(UI.lucky_thing);
document.querySelector('.share-btn').textContent=t(UI.share_btn);
document.getElementById('footerText').textContent=t(UI.footer_daily).replace('✨','🌿');

var flipped=false;
function flipCard(){
  if(flipped) return;
  flipped=true;
  document.getElementById('cardBack').innerHTML='<div class="card-emoji">'+todayCard.emoji+'</div><div class="card-name">'+t(todayCard.name)+'</div><div class="card-name-en">'+(LANG==='zh'?todayCard.name.en:todayCard.name.zh)+'</div><div class="card-keyword">'+t(todayCard.keywords).map(function(k){return'<span class="kw">'+k+'</span>'}).join('')+'</div><div class="card-msg">'+t(todayCard.msg)+'</div><div class="card-wish">'+t(todayCard.wish)+' 🌿</div>';
  document.getElementById('cardInner').classList.add('flipped');
  setTimeout(function(){
    document.getElementById('result').classList.add('show');
    setTimeout(function(){
      document.getElementById('loveFill').style.width=love+'%';document.getElementById('lovePct').textContent=love+'%';
      document.getElementById('workFill').style.width=work+'%';document.getElementById('workPct').textContent=work+'%';
      document.getElementById('luckFill').style.width=luck+'%';document.getElementById('luckPct').textContent=luck+'%';
    },200);
    document.getElementById('affirmation').textContent=t(todayAffirm);
    document.getElementById('luckyColor').textContent=t(todayColor.name);document.getElementById('luckyColorIcon').textContent=todayColor.icon;
    document.getElementById('luckyNum').textContent=todayNum;
    document.getElementById('luckyThing').textContent=t(todayThing.name);document.getElementById('luckyThingIcon').textContent=todayThing.icon;
  },900);
}

function shareCard(){
  var btn=document.querySelector('.share-btn');btn.textContent=t(UI.generating);btn.disabled=true;
  try{
    var W=750,H=1334,c=document.createElement('canvas');c.width=W;c.height=H;var ctx=c.getContext('2d');
    // Forest background
    ctx.fillStyle='#f5f0e8';ctx.fillRect(0,0,W,H);
    // Subtle leaf pattern
    ctx.globalAlpha=0.04;ctx.font='30px serif';for(var i=0;i<30;i++){ctx.fillText(['🍃','🌿','☘️','🌱'][i%4],Math.random()*W,Math.random()*H)}ctx.globalAlpha=1;
    function ft(tx,x,y,f,co,a){ctx.font=f;ctx.fillStyle=co;ctx.textAlign=a||'center';ctx.fillText(tx,x,y,W-80)}
    function wt(tx,x,y,f,co,mw,lh){ctx.font=f;ctx.fillStyle=co;ctx.textAlign='center';var ch=tx.split(''),line='',cy=y;for(var j=0;j<ch.length;j++){var test=line+ch[j];if(ctx.measureText(test).width>mw&&line){ctx.fillText(line,x,cy);line=ch[j];cy+=lh}else line=test}if(line)ctx.fillText(line,x,cy);return cy}
    ft('🌿 '+t(UI.daily_title),W/2,70,'bold 36px sans-serif','#5a7247');
    var dateStr=LANG==='en'?['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()]+' '+now.getDate()+', '+now.getFullYear():now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日';
    ft(dateStr,W/2,115,'20px sans-serif','#8fa97a');
    ctx.strokeStyle='rgba(146,176,106,0.35)';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(120,150,510,520,20);ctx.stroke();
    ctx.fillStyle='#fffdf7';ctx.beginPath();ctx.roundRect(120,150,510,520,20);ctx.fill();
    ft(todayCard.emoji,W/2,230,'60px sans-serif','#000');ft(t(todayCard.name),W/2,290,'bold 32px sans-serif','#5a7247');ft(LANG==='zh'?todayCard.name.en:todayCard.name.zh,W/2,320,'18px sans-serif','#7a6e5d');
    ft(t(todayCard.keywords).join('  ·  '),W/2,358,'18px sans-serif','#8fa97a');
    var ey=wt(t(todayCard.msg),W/2,405,'22px sans-serif','#3d3427',440,34);
    ft(t(todayCard.wish)+' 🌿',W/2,ey+45,'italic 20px sans-serif','#c77dba');
    var by=710;[{l:t(UI.love_energy),v:love,c:['#c77dba','#e0a4d4']},{l:t(UI.work_energy),v:work,c:['#6a8caf','#92b5d4']},{l:t(UI.luck_energy),v:luck,c:['#92b06a','#b8d48a']}].forEach(function(b){ft(b.l,90,by,'18px sans-serif','#7a6e5d','left');ft(b.v+'%',W-90,by,'18px sans-serif','#3d3427','right');ctx.fillStyle='rgba(146,176,106,0.1)';ctx.beginPath();ctx.roundRect(90,by+10,W-180,10,5);ctx.fill();var bg=ctx.createLinearGradient(90,0,90+(W-180)*b.v/100,0);bg.addColorStop(0,b.c[0]);bg.addColorStop(1,b.c[1]);ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(90,by+10,(W-180)*b.v/100,10,5);ctx.fill();by+=55});
    var ay=by+15;ctx.fillStyle='rgba(146,176,106,0.06)';ctx.strokeStyle='rgba(146,176,106,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(70,ay,W-140,70,12);ctx.fill();ctx.stroke();ft('" '+t(todayAffirm),W/2,ay+42,'22px sans-serif','#6b4f3a');
    var ly=ay+100;ft(todayColor.icon+' '+t(UI.lucky_color),W/2-200,ly,'16px sans-serif','#7a6e5d');ft(t(todayColor.name),W/2-200,ly+28,'bold 20px sans-serif','#3d3427');ft('🔢 '+t(UI.lucky_num),W/2,ly,'16px sans-serif','#7a6e5d');ft(String(todayNum),W/2,ly+28,'bold 20px sans-serif','#3d3427');ft(todayThing.icon+' '+t(UI.lucky_thing),W/2+200,ly,'16px sans-serif','#7a6e5d');ft(t(todayThing.name),W/2+200,ly+28,'bold 20px sans-serif','#3d3427');
    var qrc=generateQRCanvas('https://tarot.1yong.com',120),qy=ly+80;ctx.fillStyle='#fff';ctx.beginPath();ctx.roundRect(W/2-65,qy-5,130,130,8);ctx.fill();ctx.drawImage(qrc,W/2-60,qy,120,120);ft(t(UI.qr_hint),W/2,qy+148,'16px sans-serif','rgba(61,52,39,0.3)');
    c.toBlob(function(blob){var f=new File([blob],'daily-tarot.png',{type:'image/png'});if(navigator.canShare&&navigator.canShare({files:[f]})){navigator.share({files:[f],title:t(UI.daily_title)}).catch(function(){})}else{var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='daily-tarot.png';a.click();URL.revokeObjectURL(a.href)}btn.textContent=t(UI.share_btn);btn.disabled=false},'image/png');
  }catch(e){alert(t(UI.share_fail)+e.message);btn.textContent=t(UI.share_btn);btn.disabled=false}
}
</script>
</body>
</html>
