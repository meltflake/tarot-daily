<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>每日一签 🌅</title>
<meta name="description" content="每天一张塔罗牌，给你满满正能量">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0a1a;--card-bg:linear-gradient(145deg,#1a1432,#2d1f4e);--gold:#f5c542;--gold-soft:#fde68a;--purple:#a78bfa;--pink:#f472b6;--text:#e2e0ef;--text-soft:#a8a3c0}
body{font-family:'Noto Serif SC',serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(120,80,200,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(200,120,255,.06) 0%,transparent 50%)}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:.8;transform:scale(1.2)}}
.container{position:relative;z-index:1;max-width:420px;width:100%;padding:2rem 1.2rem;text-align:center}
.back-link{display:inline-block;color:var(--text-soft);font-size:.8rem;text-decoration:none;margin-bottom:1rem;padding:.3rem .8rem;border:1px solid rgba(255,255,255,.1);border-radius:15px}
.back-link:hover{border-color:var(--purple);color:var(--purple)}
h1{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.3rem}
.subtitle{font-size:.85rem;color:var(--text-soft);margin-bottom:1.5rem}
.date{font-size:.78rem;color:var(--purple);margin-bottom:1.5rem;letter-spacing:2px}
.card-container{perspective:800px;margin:0 auto 2rem;width:260px;height:400px;cursor:pointer}
.card-inner{position:relative;width:100%;height:100%;transition:transform .8s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.card-inner.flipped{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;overflow:hidden}
.card-front{background:var(--card-bg);border:2px solid rgba(245,197,66,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(167,139,250,.15),0 8px 32px rgba(0,0,0,.4)}
.card-front .symbol{font-size:4rem;margin-bottom:1rem;animation:float 3s ease-in-out infinite}
.card-front .tap-hint{font-size:.8rem;color:var(--gold-soft);animation:pulse 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.card-back{transform:rotateY(180deg);background:var(--card-bg);border:2px solid rgba(245,197,66,.4);display:flex;flex-direction:column;align-items:center;padding:1.5rem 1.2rem;box-shadow:0 0 40px rgba(245,197,66,.1),0 8px 32px rgba(0,0,0,.4)}
.card-back .card-emoji{font-size:3rem;margin-bottom:.5rem}
.card-back .card-name{font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:.2rem}
.card-back .card-name-en{font-size:.75rem;color:var(--text-soft);margin-bottom:.8rem}
.card-back .card-keyword{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;margin-bottom:.8rem}
.card-back .kw{background:rgba(167,139,250,.15);color:var(--purple);padding:.2rem .6rem;border-radius:20px;font-size:.72rem}
.card-back .card-msg{font-size:.88rem;line-height:1.7;color:var(--text);flex:1;display:flex;align-items:center;text-align:center}
.card-back .card-wish{font-size:.78rem;color:var(--pink);margin-top:.6rem;font-style:italic}
.result{display:none;margin-top:1rem}
.result.show{display:block;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.energy-bar{margin:1.2rem 0;text-align:left}
.energy-label{font-size:.78rem;color:var(--text-soft);margin-bottom:.4rem;display:flex;justify-content:space-between}
.energy-track{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.energy-fill{height:100%;border-radius:3px;transition:width 1.5s ease;width:0}
.energy-fill.love{background:linear-gradient(90deg,#f472b6,#fb7185)}
.energy-fill.work{background:linear-gradient(90deg,#a78bfa,#818cf8)}
.energy-fill.luck{background:linear-gradient(90deg,#fbbf24,#f59e0b)}
.affirmation{background:rgba(245,197,66,.06);border:1px solid rgba(245,197,66,.15);border-radius:12px;padding:1rem;margin:1.2rem 0;font-size:.85rem;line-height:1.7;color:var(--gold-soft)}
.affirmation::before{content:'"';font-size:1.5rem;color:var(--gold);display:block;margin-bottom:.2rem}
.lucky-items{display:flex;justify-content:center;gap:1.5rem;margin:1rem 0}
.lucky-item{text-align:center}
.lucky-item .li-icon{font-size:1.5rem;margin-bottom:.2rem}
.lucky-item .li-label{font-size:.7rem;color:var(--text-soft)}
.lucky-item .li-value{font-size:.8rem;color:var(--text);font-weight:700}
.share-btn{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;padding:.7rem 2rem;border-radius:25px;font-size:.85rem;cursor:pointer;margin-top:1rem;font-family:inherit;box-shadow:0 4px 15px rgba(167,139,250,.3)}
.share-btn:active{transform:scale(.95)}
.footer{margin-top:2rem;font-size:.7rem;color:rgba(255,255,255,.2);padding-bottom:2rem}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  <a class="back-link" href="index.html">← 返回</a>
  <h1>🌅 每日一签</h1>
  <div class="subtitle">今天的宇宙想对你说什么？</div>
  <div class="date" id="dateDisplay"></div>

  <div class="card-container" id="cardContainer" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-front">
        <div class="symbol">🔮</div>
        <div class="tap-hint">✨ 轻触翻牌 ✨</div>
      </div>
      <div class="card-back" id="cardBack"></div>
    </div>
  </div>

  <div class="result" id="result">
    <div class="energy-bar"><div class="energy-label"><span>💕 爱情能量</span><span id="lovePct"></span></div><div class="energy-track"><div class="energy-fill love" id="loveFill"></div></div></div>
    <div class="energy-bar"><div class="energy-label"><span>💼 事业能量</span><span id="workPct"></span></div><div class="energy-track"><div class="energy-fill work" id="workFill"></div></div></div>
    <div class="energy-bar"><div class="energy-label"><span>🍀 幸运能量</span><span id="luckPct"></span></div><div class="energy-track"><div class="energy-fill luck" id="luckFill"></div></div></div>
    <div class="affirmation" id="affirmation"></div>
    <div class="lucky-items">
      <div class="lucky-item"><div class="li-icon" id="luckyColorIcon">🎨</div><div class="li-label">幸运色</div><div class="li-value" id="luckyColor"></div></div>
      <div class="lucky-item"><div class="li-icon">🔢</div><div class="li-label">幸运数字</div><div class="li-value" id="luckyNum"></div></div>
      <div class="lucky-item"><div class="li-icon" id="luckyThingIcon">🌟</div><div class="li-label">幸运物</div><div class="li-value" id="luckyThing"></div></div>
    </div>
    <button class="share-btn" onclick="shareCard()">📸 保存分享</button>
  </div>
  <div class="footer">✨ 每日一签 · 用正能量开启每一天</div>
</div>
<script src="qr.min.js"></script>
<script src="cards.js"></script>
<script>
var seed = getDaySeed();
var rng = seededRandom(seed);
var todayCard = CARDS[Math.floor(rng() * CARDS.length)];
var todayAffirm = AFFIRMATIONS[Math.floor(rng() * AFFIRMATIONS.length)];
var todayColor = COLORS[Math.floor(rng() * COLORS.length)];
var todayNum = Math.floor(rng() * 9) + 1;
var todayThing = THINGS[Math.floor(rng() * THINGS.length)];
var love = Math.floor(rng() * 25) + 75;
var work = Math.floor(rng() * 25) + 75;
var luck = Math.floor(rng() * 25) + 75;
var now = new Date();
var weekdays = ['日','一','二','三','四','五','六'];

document.getElementById('dateDisplay').textContent = now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 星期'+weekdays[now.getDay()];
createStars();

var flipped = false;
function flipCard(){
  if(flipped) return;
  flipped = true;
  document.getElementById('cardBack').innerHTML = '<div class="card-emoji">'+todayCard.emoji+'</div><div class="card-name">'+todayCard.name+'</div><div class="card-name-en">'+todayCard.en+'</div><div class="card-keyword">'+todayCard.keywords.map(function(k){return '<span class="kw">'+k+'</span>'}).join('')+'</div><div class="card-msg">'+todayCard.msg+'</div><div class="card-wish">'+todayCard.wish+' 💫</div>';
  document.getElementById('cardInner').classList.add('flipped');
  setTimeout(function(){
    document.getElementById('result').classList.add('show');
    setTimeout(function(){
      document.getElementById('loveFill').style.width=love+'%'; document.getElementById('lovePct').textContent=love+'%';
      document.getElementById('workFill').style.width=work+'%'; document.getElementById('workPct').textContent=work+'%';
      document.getElementById('luckFill').style.width=luck+'%'; document.getElementById('luckPct').textContent=luck+'%';
    },200);
    document.getElementById('affirmation').textContent=todayAffirm;
    document.getElementById('luckyColor').textContent=todayColor.name;
    document.getElementById('luckyColorIcon').textContent=todayColor.icon;
    document.getElementById('luckyNum').textContent=todayNum;
    document.getElementById('luckyThing').textContent=todayThing.name;
    document.getElementById('luckyThingIcon').textContent=todayThing.icon;
  },900);
}

function shareCard(){
  var btn=document.querySelector('.share-btn'); btn.textContent='⏳ 生成中...'; btn.disabled=true;
  try{_doShareDaily(btn)}catch(e){alert('生成失败：'+e.message);btn.textContent='📸 保存分享';btn.disabled=false}
}
function _doShareDaily(btn){
  var W=750,H=1334,c=document.createElement('canvas');c.width=W;c.height=H;var ctx=c.getContext('2d');
  var grad=ctx.createLinearGradient(0,0,W,H);grad.addColorStop(0,'#0f0a1a');grad.addColorStop(0.5,'#1a1432');grad.addColorStop(1,'#0f0a1a');ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  for(var i=0;i<80;i++){ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,Math.random()*1.5+.5,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+(Math.random()*.5+.1)+')';ctx.fill()}
  function ft(t,x,y,f,co,a,mw){ctx.font=f;ctx.fillStyle=co;ctx.textAlign=a||'center';ctx.fillText(t,x,y,mw||W-80)}
  function wt(t,x,y,f,co,mw,lh){ctx.font=f;ctx.fillStyle=co;ctx.textAlign='center';var ch=t.split(''),line='',cy=y;for(var i=0;i<ch.length;i++){var test=line+ch[i];if(ctx.measureText(test).width>mw&&line){ctx.fillText(line,x,cy);line=ch[i];cy+=lh}else line=test}if(line)ctx.fillText(line,x,cy);return cy}
  ft('✨ 每日一签 ✨',W/2,70,'bold 36px sans-serif','#f5c542');
  var ds=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 星期'+weekdays[now.getDay()];ft(ds,W/2,115,'20px sans-serif','#a78bfa');
  ctx.strokeStyle='rgba(245,197,66,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(120,150,510,520,20);ctx.stroke();
  var cg=ctx.createLinearGradient(120,150,630,670);cg.addColorStop(0,'rgba(26,20,50,0.9)');cg.addColorStop(1,'rgba(45,31,78,0.9)');ctx.fillStyle=cg;ctx.beginPath();ctx.roundRect(120,150,510,520,20);ctx.fill();
  ft(todayCard.emoji,W/2,230,'60px sans-serif','#fff');ft(todayCard.name,W/2,290,'bold 32px sans-serif','#f5c542');ft(todayCard.en,W/2,320,'18px sans-serif','#a8a3c0');
  ft(todayCard.keywords.join('  ·  '),W/2,358,'18px sans-serif','#a78bfa');
  var ey=wt(todayCard.msg,W/2,405,'22px sans-serif','#e2e0ef',440,34);ft(todayCard.wish+' 💫',W/2,ey+45,'italic 20px sans-serif','#f472b6');
  var by=710;[{l:'💕 爱情能量',v:love,c:['#f472b6','#fb7185']},{l:'💼 事业能量',v:work,c:['#a78bfa','#818cf8']},{l:'🍀 幸运能量',v:luck,c:['#fbbf24','#f59e0b']}].forEach(function(b){
    ft(b.l,90,by,'18px sans-serif','#a8a3c0','left');ft(b.v+'%',W-90,by,'18px sans-serif','#e2e0ef','right');
    ctx.fillStyle='rgba(255,255,255,0.08)';ctx.beginPath();ctx.roundRect(90,by+10,W-180,10,5);ctx.fill();
    var bg=ctx.createLinearGradient(90,0,90+(W-180)*b.v/100,0);bg.addColorStop(0,b.c[0]);bg.addColorStop(1,b.c[1]);ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(90,by+10,(W-180)*b.v/100,10,5);ctx.fill();by+=55});
  var ay=by+15;ctx.fillStyle='rgba(245,197,66,0.06)';ctx.strokeStyle='rgba(245,197,66,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(70,ay,W-140,70,12);ctx.fill();ctx.stroke();
  ft('" '+todayAffirm,W/2,ay+42,'22px sans-serif','#fde68a');
  var ly=ay+100;ft(todayColor.icon+' 幸运色',W/2-200,ly,'16px sans-serif','#a8a3c0');ft(todayColor.name,W/2-200,ly+28,'bold 20px sans-serif','#e2e0ef');
  ft('🔢 幸运数字',W/2,ly,'16px sans-serif','#a8a3c0');ft(String(todayNum),W/2,ly+28,'bold 20px sans-serif','#e2e0ef');
  ft(todayThing.icon+' 幸运物',W/2+200,ly,'16px sans-serif','#a8a3c0');ft(todayThing.name,W/2+200,ly+28,'bold 20px sans-serif','#e2e0ef');
  var qrc=generateQRCanvas('https://tarot.1yong.com',120),qy=ly+80;ctx.fillStyle='#fff';ctx.beginPath();ctx.roundRect(W/2-65,qy-5,130,130,8);ctx.fill();ctx.drawImage(qrc,W/2-60,qy,120,120);
  ft('长按识别二维码 · 抽你的每日一签',W/2,qy+148,'16px sans-serif','rgba(255,255,255,0.4)');
  c.toBlob(function(blob){var f=new File([blob],'daily-tarot.png',{type:'image/png'});if(navigator.canShare&&navigator.canShare({files:[f]})){navigator.share({files:[f],title:'每日一签 ✨'}).catch(function(){})}else{var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='daily-tarot.png';a.click();URL.revokeObjectURL(a.href)}btn.textContent='📸 保存分享';btn.disabled=false},'image/png');
}
</script>
</body>
</html>
