<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>每日一签 ✨ Daily Tarot</title>
<meta name="description" content="每天一张塔罗牌，给你满满正能量 ✨">
<meta property="og:title" content="每日一签 ✨ Daily Tarot">
<meta property="og:description" content="今天的宇宙想对你说什么？翻开你的每日塔罗牌 🔮">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0a1a;--card-bg:linear-gradient(145deg,#1a1432,#2d1f4e);
  --gold:#f5c542;--gold-soft:#fde68a;--purple:#a78bfa;--pink:#f472b6;
  --text:#e2e0ef;--text-soft:#a8a3c0;
}
body{
  font-family:'Noto Serif SC',serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(120,80,200,.08) 0%,transparent 50%),
                    radial-gradient(ellipse at 80% 20%,rgba(200,120,255,.06) 0%,transparent 50%);
}

/* Stars */
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:.8;transform:scale(1.2)}}

.container{position:relative;z-index:1;max-width:420px;width:100%;padding:2rem 1.2rem;text-align:center}

h1{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.3rem}
.subtitle{font-size:.85rem;color:var(--text-soft);margin-bottom:2rem}
.date{font-size:.78rem;color:var(--purple);margin-bottom:1.5rem;letter-spacing:2px}

/* Card */
.card-container{perspective:800px;margin:0 auto 2rem;width:260px;height:400px;cursor:pointer}
.card-inner{position:relative;width:100%;height:100%;transition:transform .8s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.card-inner.flipped{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;overflow:hidden}
.card-front{
  background:var(--card-bg);border:2px solid rgba(245,197,66,.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 0 30px rgba(167,139,250,.15),0 8px 32px rgba(0,0,0,.4);
}
.card-front .symbol{font-size:4rem;margin-bottom:1rem;animation:float 3s ease-in-out infinite}
.card-front .tap-hint{font-size:.8rem;color:var(--gold-soft);animation:pulse 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

.card-back{
  transform:rotateY(180deg);
  background:var(--card-bg);border:2px solid rgba(245,197,66,.4);
  display:flex;flex-direction:column;align-items:center;padding:1.5rem 1.2rem;
  box-shadow:0 0 40px rgba(245,197,66,.1),0 8px 32px rgba(0,0,0,.4);
}
.card-back .card-emoji{font-size:3rem;margin-bottom:.5rem}
.card-back .card-name{font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:.2rem}
.card-back .card-name-en{font-size:.75rem;color:var(--text-soft);margin-bottom:.8rem}
.card-back .card-keyword{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;margin-bottom:.8rem}
.card-back .kw{background:rgba(167,139,250,.15);color:var(--purple);padding:.2rem .6rem;border-radius:20px;font-size:.72rem}
.card-back .card-msg{font-size:.88rem;line-height:1.7;color:var(--text);flex:1;display:flex;align-items:center;text-align:center}
.card-back .card-wish{font-size:.78rem;color:var(--pink);margin-top:.6rem;font-style:italic}

/* Result area */
.result{display:none;margin-top:1rem}
.result.show{display:block;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.energy-bar{margin:1.2rem 0;text-align:left}
.energy-label{font-size:.78rem;color:var(--text-soft);margin-bottom:.4rem;display:flex;justify-content:space-between}
.energy-track{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.energy-fill{height:100%;border-radius:3px;transition:width 1.5s ease;width:0}
.energy-fill.love{background:linear-gradient(90deg,#f472b6,#fb7185)}
.energy-fill.work{background:linear-gradient(90deg,#a78bfa,#818cf8)}
.energy-fill.luck{background:linear-gradient(90deg,#fbbf24,#f59e0b)}

.affirmation{background:rgba(245,197,66,.06);border:1px solid rgba(245,197,66,.15);border-radius:12px;padding:1rem;margin:1.2rem 0;font-size:.85rem;line-height:1.7;color:var(--gold-soft)}
.affirmation::before{content:'"';font-size:1.5rem;color:var(--gold);display:block;margin-bottom:.2rem}

.lucky-items{display:flex;justify-content:center;gap:1.5rem;margin:1rem 0}
.lucky-item{text-align:center}
.lucky-item .li-icon{font-size:1.5rem;margin-bottom:.2rem}
.lucky-item .li-label{font-size:.7rem;color:var(--text-soft)}
.lucky-item .li-value{font-size:.8rem;color:var(--text);font-weight:700}

.share-btn{
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;border:none;padding:.7rem 2rem;border-radius:25px;font-size:.85rem;
  cursor:pointer;margin-top:1rem;font-family:inherit;
  box-shadow:0 4px 15px rgba(167,139,250,.3);transition:transform .2s,box-shadow .2s
}
.share-btn:active{transform:scale(.95)}

.reset-btn{background:none;border:1px solid rgba(255,255,255,.15);color:var(--text-soft);padding:.5rem 1.5rem;border-radius:20px;font-size:.78rem;cursor:pointer;margin-top:.8rem;font-family:inherit}
.reset-btn:hover{border-color:var(--purple);color:var(--purple)}

.footer{margin-top:2rem;font-size:.7rem;color:rgba(255,255,255,.2);padding-bottom:2rem}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  <h1>✨ 每日一签</h1>
  <div class="subtitle">今天的宇宙想对你说什么？</div>
  <div class="date" id="dateDisplay"></div>

  <div class="card-container" id="cardContainer" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-front">
        <div class="symbol">🔮</div>
        <div class="tap-hint">✨ 轻触翻牌 ✨</div>
      </div>
      <div class="card-back" id="cardBack">
        <!-- filled by JS -->
      </div>
    </div>
  </div>

  <div class="result" id="result">
    <div class="energy-bar">
      <div class="energy-label"><span>💕 爱情能量</span><span id="lovePct"></span></div>
      <div class="energy-track"><div class="energy-fill love" id="loveFill"></div></div>
    </div>
    <div class="energy-bar">
      <div class="energy-label"><span>💼 事业能量</span><span id="workPct"></span></div>
      <div class="energy-track"><div class="energy-fill work" id="workFill"></div></div>
    </div>
    <div class="energy-bar">
      <div class="energy-label"><span>🍀 幸运能量</span><span id="luckPct"></span></div>
      <div class="energy-track"><div class="energy-fill luck" id="luckFill"></div></div>
    </div>

    <div class="affirmation" id="affirmation"></div>

    <div class="lucky-items">
      <div class="lucky-item"><div class="li-icon" id="luckyColorIcon">🎨</div><div class="li-label">幸运色</div><div class="li-value" id="luckyColor"></div></div>
      <div class="lucky-item"><div class="li-icon">🔢</div><div class="li-label">幸运数字</div><div class="li-value" id="luckyNum"></div></div>
      <div class="lucky-item"><div class="li-icon" id="luckyThingIcon">🌟</div><div class="li-label">幸运物</div><div class="li-value" id="luckyThing"></div></div>
    </div>

    <button class="share-btn" onclick="shareCard()">📸 保存分享</button>
    <br>
    <button class="reset-btn" onclick="resetCard()">🔄 再抽一次（明天更准哦）</button>
  </div>

  <div class="footer">✨ 每日一签 · 用正能量开启每一天</div>
</div>

<script>
// ===== TAROT CARDS (22 Major Arcana, all positive interpretations) =====
const CARDS = [
  {name:'愚者',en:'The Fool',emoji:'🌈',keywords:['新开始','勇气','纯真'],
   msg:'今天适合迈出那一步。不必想太多，宇宙会接住你的勇敢。每个了不起的旅程，都从第一步开始。',
   wish:'愿你永远保持孩子般的好奇心'},
  {name:'魔术师',en:'The Magician',emoji:'✨',keywords:['创造力','自信','天赋'],
   msg:'你拥有把想法变成现实的力量。今天不管做什么，都会特别有灵感。相信自己的直觉，它不会让你失望。',
   wish:'愿你的每个创意都闪闪发光'},
  {name:'女祭司',en:'The High Priestess',emoji:'🌙',keywords:['直觉','智慧','内在'],
   msg:'今天适合安静下来，听听内心的声音。你的直觉比你想象的更敏锐。那个隐约浮现的答案，就是对的。',
   wish:'愿你信任自己内心深处的智慧'},
  {name:'女皇',en:'The Empress',emoji:'🌸',keywords:['丰盛','美好','温柔'],
   msg:'今天的你散发着温暖的光芒。对自己好一点，享受生活中的美好细节。你值得拥有所有的幸福。',
   wish:'愿你被温柔以待，被世界偏爱'},
  {name:'皇帝',en:'The Emperor',emoji:'👑',keywords:['力量','掌控','稳定'],
   msg:'你比自己以为的更强大。今天适合做决定、立计划。你有能力掌控自己的人生方向。',
   wish:'愿你拥有改变一切的勇气和力量'},
  {name:'教皇',en:'The Hierophant',emoji:'📿',keywords:['引导','信念','传承'],
   msg:'今天可能会遇到一位好老师或得到宝贵建议。保持谦逊和开放的心态，智慧就在身边。',
   wish:'愿你在人生路上遇到好的指引'},
  {name:'恋人',en:'The Lovers',emoji:'💕',keywords:['爱情','和谐','选择'],
   msg:'今天的人际关系特别和谐。不管是友情还是爱情，都会感受到温暖的连接。记得向重要的人表达感谢。',
   wish:'愿你身边都是真心对你好的人'},
  {name:'战车',en:'The Chariot',emoji:'🏆',keywords:['胜利','决心','行动'],
   msg:'今天的你势不可挡！遇到的困难都是纸老虎。坚定方向，全力以赴，胜利就在前方等你。',
   wish:'愿你所向披靡，心想事成'},
  {name:'力量',en:'Strength',emoji:'🦁',keywords:['内在力量','温柔','勇气'],
   msg:'真正的力量不是强硬，而是温柔地坚持。今天用耐心和善良去面对挑战，你会发现一切迎刃而解。',
   wish:'愿你外柔内刚，无惧风雨'},
  {name:'隐士',en:'The Hermit',emoji:'🏮',keywords:['独处','思考','发现'],
   msg:'今天适合给自己一段安静的时光。泡杯茶、读本书、散个步——最好的灵感往往在独处时降临。',
   wish:'愿你在安静中找到内心的光'},
  {name:'命运之轮',en:'Wheel of Fortune',emoji:'🎡',keywords:['好运','转变','机遇'],
   msg:'运气正在悄悄转向你！今天可能会遇到意想不到的好事。保持积极的心态，好运会被你的笑容吸引。',
   wish:'愿好运从今天开始眷顾你'},
  {name:'正义',en:'Justice',emoji:'⚖️',keywords:['公平','真相','平衡'],
   msg:'今天适合理清思路，做出公正的决定。你之前的努力不会白费，该来的回报一定会来。',
   wish:'愿你付出的每一份努力都被看见'},
  {name:'倒吊人',en:'The Hanged Man',emoji:'🧘',keywords:['换个角度','放下','顿悟'],
   msg:'换个角度看问题，你会发现全新的风景。今天如果遇到瓶颈，试着放松一下，答案可能就在意想不到的地方。',
   wish:'愿你拥有随时转换视角的智慧'},
  {name:'死神',en:'Death',emoji:'🦋',keywords:['蜕变','新生','告别'],
   msg:'旧的篇章正在翻页，新的故事即将开始。放下不再适合你的，才能腾出双手拥抱更好的。今天是蜕变的好日子。',
   wish:'愿你像蝴蝶一样美丽蜕变'},
  {name:'节制',en:'Temperance',emoji:'🌊',keywords:['平衡','耐心','流动'],
   msg:'今天适合慢下来，找到生活的节奏感。不急不躁，像流水一样自然前行。最好的结果值得等待。',
   wish:'愿你在忙碌中也能保持从容'},
  {name:'恶魔',en:'The Devil',emoji:'🔥',keywords:['突破','释放','觉醒'],
   msg:'今天适合打破束缚你的旧观念！那些"我不行"的想法，都是纸做的枷锁。勇敢挣脱，你会发现自己自由又强大。',
   wish:'愿你挣脱一切束缚，活出真我'},
  {name:'塔',en:'The Tower',emoji:'⚡',keywords:['突破','重建','真相'],
   msg:'有时候打破旧的才能建设新的。今天可能会有出乎意料的变化，但别担心——这是宇宙在帮你清理道路，为更好的未来腾出空间。',
   wish:'愿每次风雨过后都是更美的彩虹'},
  {name:'星星',en:'The Star',emoji:'⭐',keywords:['希望','治愈','光明'],
   msg:'你就是夜空中最亮的那颗星。今天会感到特别平静和充满希望。不管之前经历了什么，从现在开始一切都会越来越好。',
   wish:'愿你永远被希望的光芒照亮'},
  {name:'月亮',en:'The Moon',emoji:'🌙',keywords:['想象力','梦想','灵感'],
   msg:'今天你的想象力和创造力特别强。把那些奇妙的想法记录下来，说不定其中就藏着改变人生的宝藏。',
   wish:'愿你的每个梦想都值得追寻'},
  {name:'太阳',en:'The Sun',emoji:'☀️',keywords:['快乐','活力','成功'],
   msg:'今天的你像太阳一样耀眼！做什么都会顺利，身边的人也会被你的好心情感染。尽情享受这美好的一天吧！',
   wish:'愿你每天都像今天一样灿烂'},
  {name:'审判',en:'Judgement',emoji:'🔔',keywords:['觉醒','重生','使命'],
   msg:'你正在迎来人生新阶段！过去的经历都是为了今天的你而准备。勇敢回应内心的召唤，你的使命比你想象的更伟大。',
   wish:'愿你听见内心的声音，活出使命'},
  {name:'世界',en:'The World',emoji:'🌍',keywords:['圆满','成就','完整'],
   msg:'恭喜！你正在走向一个圆满的时刻。之前的坚持和努力终于开花结果。享受这份成就感，你值得为自己骄傲。',
   wish:'愿你拥有完整而丰盛的人生'},
];

// ===== AFFIRMATIONS =====
const AFFIRMATIONS = [
  '我值得拥有一切美好的事物',
  '我每天都在变成更好的自己',
  '我散发的光芒会照亮身边的人',
  '我是被爱的，被需要的，被珍惜的',
  '今天的我比昨天更勇敢',
  '我拥有把困难变成机会的能力',
  '我的存在本身就是一份礼物',
  '好运正在赶来的路上',
  '我配得上所有的幸福和成功',
  '宇宙正在悄悄为我安排最好的',
  '我允许自己休息，也允许自己发光',
  '我相信一切都会在最好的时间发生',
  '我的温柔是一种了不起的力量',
  '我选择用爱和善意对待这个世界',
  '每一天都是全新的开始',
  '我正在一步步靠近梦想',
  '我的内心有一座取之不尽的宝藏',
  '我值得被温柔以待',
  '今天是充满可能性的一天',
  '我为自己感到骄傲',
];

const COLORS = [
  {name:'樱花粉',icon:'🌸',hex:'#FFB7C5'},{name:'薰衣草紫',icon:'💜',hex:'#B8A9E8'},
  {name:'天空蓝',icon:'🦋',hex:'#87CEEB'},{name:'薄荷绿',icon:'🌿',hex:'#98FB98'},
  {name:'柠檬黄',icon:'🍋',hex:'#FFF44F'},{name:'珊瑚橘',icon:'🧡',hex:'#FF7F50'},
  {name:'玫瑰金',icon:'🌹',hex:'#E8B4B8'},{name:'奶茶棕',icon:'🧋',hex:'#D2B48C'},
  {name:'云朵白',icon:'☁️',hex:'#F0F0F0'},{name:'蜜桃粉',icon:'🍑',hex:'#FFCBA4'},
];

const THINGS = [
  {name:'一杯咖啡',icon:'☕'},{name:'一本好书',icon:'📖'},{name:'一首老歌',icon:'🎵'},
  {name:'一朵鲜花',icon:'🌷'},{name:'一颗糖果',icon:'🍬'},{name:'一个拥抱',icon:'🤗'},
  {name:'一段散步',icon:'🚶‍♀️'},{name:'一片云朵',icon:'☁️'},{name:'一缕阳光',icon:'🌤️'},
  {name:'一杯奶茶',icon:'🧋'},{name:'一张明信片',icon:'💌'},{name:'一块巧克力',icon:'🍫'},
];

// ===== DAILY SEED (same card all day for same user) =====
function getDaySeed(){
  const d = new Date();
  return d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
}
function seededRandom(seed){
  let s = seed;
  return function(){
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

// ===== INIT =====
const seed = getDaySeed();
const rng = seededRandom(seed);
const todayCard = CARDS[Math.floor(rng() * CARDS.length)];
const todayAffirm = AFFIRMATIONS[Math.floor(rng() * AFFIRMATIONS.length)];
const todayColor = COLORS[Math.floor(rng() * COLORS.length)];
const todayNum = Math.floor(rng() * 9) + 1;
const todayThing = THINGS[Math.floor(rng() * THINGS.length)];
const love = Math.floor(rng() * 25) + 75;
const work = Math.floor(rng() * 25) + 75;
const luck = Math.floor(rng() * 25) + 75;

// Date display
const now = new Date();
const weekdays = ['日','一','二','三','四','五','六'];
document.getElementById('dateDisplay').textContent =
  `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${weekdays[now.getDay()]}`;

// Stars background
(function createStars(){
  const el = document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s = document.createElement('div');
    s.className='star';
    const size = Math.random()*2.5+1;
    s.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*3}s`;
    el.appendChild(s);
  }
})();

// Flip
var flipped = false;
function flipCard(){
  if(flipped) return;
  flipped = true;
  // Fill card back
  document.getElementById('cardBack').innerHTML = `
    <div class="card-emoji">${todayCard.emoji}</div>
    <div class="card-name">${todayCard.name}</div>
    <div class="card-name-en">${todayCard.en}</div>
    <div class="card-keyword">${todayCard.keywords.map(k=>`<span class="kw">${k}</span>`).join('')}</div>
    <div class="card-msg">${todayCard.msg}</div>
    <div class="card-wish">${todayCard.wish} 💫</div>
  `;
  document.getElementById('cardInner').classList.add('flipped');

  // Show result after flip
  setTimeout(()=>{
    const r = document.getElementById('result');
    r.classList.add('show');
    // Animate bars
    setTimeout(()=>{
      document.getElementById('loveFill').style.width = love+'%';
      document.getElementById('lovePct').textContent = love+'%';
      document.getElementById('workFill').style.width = work+'%';
      document.getElementById('workPct').textContent = work+'%';
      document.getElementById('luckFill').style.width = luck+'%';
      document.getElementById('luckPct').textContent = luck+'%';
    }, 200);
    document.getElementById('affirmation').textContent = todayAffirm;
    document.getElementById('luckyColor').textContent = todayColor.name;
    document.getElementById('luckyColorIcon').textContent = todayColor.icon;
    document.getElementById('luckyNum').textContent = todayNum;
    document.getElementById('luckyThing').textContent = todayThing.name;
    document.getElementById('luckyThingIcon').textContent = todayThing.icon;
  }, 900);
}

function resetCard(){
  flipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('result').classList.remove('show');
  document.getElementById('loveFill').style.width = '0';
  document.getElementById('workFill').style.width = '0';
  document.getElementById('luckFill').style.width = '0';
}

// ===== QR Code Generator (minimal) =====
// Based on Project Nayuki's QR Code generator (MIT license, minified)
function generateQR(text,size){
  // Use the QR API as image
  const img = new Image();
  img.crossOrigin = 'anonymous';
  return new Promise((resolve)=>{
    img.onload = ()=>resolve(img);
    img.onerror = ()=>resolve(null);
    img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}&margin=1`;
  });
}

async function shareCard(){
  const btn = document.querySelector('.share-btn');
  btn.textContent = '⏳ 生成中...';
  btn.disabled = true;

  const W = 750, H = 1334; // iPhone screenshot ratio
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  // Background gradient
  const grad = ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,'#0f0a1a');
  grad.addColorStop(0.5,'#1a1432');
  grad.addColorStop(1,'#0f0a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Stars
  for(let i=0;i<80;i++){
    ctx.beginPath();
    ctx.arc(Math.random()*W, Math.random()*H, Math.random()*1.5+0.5, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.5+0.1})`;
    ctx.fill();
  }

  // Helper functions
  function fillText(text, x, y, font, color, align='center', maxW=W-80){
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.fillText(text, x, y, maxW);
  }
  function wrapText(text, x, y, font, color, maxW, lineH){
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    const chars = text.split('');
    let line = '';
    let curY = y;
    for(const ch of chars){
      const test = line + ch;
      if(ctx.measureText(test).width > maxW && line){
        ctx.fillText(line, x, curY);
        line = ch;
        curY += lineH;
      } else {
        line = test;
      }
    }
    if(line) ctx.fillText(line, x, curY);
    return curY;
  }

  // Title
  fillText('✨ 每日一签 ✨', W/2, 70, 'bold 36px sans-serif', '#f5c542');

  // Date
  const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${weekdays[now.getDay()]}`;
  fillText(dateStr, W/2, 115, '20px sans-serif', '#a78bfa');

  // Card area (rounded rect)
  const cardX=120, cardY=150, cardW=510, cardH=520, cardR=20;
  ctx.strokeStyle = 'rgba(245,197,66,0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(cardX, cardY, cardW, cardH, cardR);
  ctx.stroke();
  // Card fill
  const cardGrad = ctx.createLinearGradient(cardX,cardY,cardX+cardW,cardY+cardH);
  cardGrad.addColorStop(0,'rgba(26,20,50,0.9)');
  cardGrad.addColorStop(1,'rgba(45,31,78,0.9)');
  ctx.fillStyle = cardGrad;
  ctx.beginPath();
  ctx.roundRect(cardX, cardY, cardW, cardH, cardR);
  ctx.fill();

  // Card emoji
  fillText(todayCard.emoji, W/2, 230, '60px sans-serif', '#fff');
  // Card name
  fillText(todayCard.name, W/2, 290, 'bold 32px sans-serif', '#f5c542');
  fillText(todayCard.en, W/2, 320, '18px sans-serif', '#a8a3c0');

  // Keywords
  const kwStr = todayCard.keywords.join('  ·  ');
  fillText(kwStr, W/2, 358, '18px sans-serif', '#a78bfa');

  // Message
  const msgEndY = wrapText(todayCard.msg, W/2, 405, '22px sans-serif', '#e2e0ef', 440, 34);

  // Wish
  fillText(todayCard.wish + ' 💫', W/2, msgEndY + 45, 'italic 20px sans-serif', '#f472b6');

  // Energy bars
  let barY = 710;
  const barLabels = [
    {label:'💕 爱情能量', val:love, color:['#f472b6','#fb7185']},
    {label:'💼 事业能量', val:work, color:['#a78bfa','#818cf8']},
    {label:'🍀 幸运能量', val:luck, color:['#fbbf24','#f59e0b']},
  ];
  barLabels.forEach(b=>{
    fillText(b.label, 90, barY, '18px sans-serif', '#a8a3c0', 'left');
    fillText(b.val+'%', W-90, barY, '18px sans-serif', '#e2e0ef', 'right');
    // Track
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath(); ctx.roundRect(90, barY+10, W-180, 10, 5); ctx.fill();
    // Fill
    const bGrad = ctx.createLinearGradient(90,0,90+(W-180)*b.val/100,0);
    bGrad.addColorStop(0,b.color[0]); bGrad.addColorStop(1,b.color[1]);
    ctx.fillStyle = bGrad;
    ctx.beginPath(); ctx.roundRect(90, barY+10, (W-180)*b.val/100, 10, 5); ctx.fill();
    barY += 55;
  });

  // Affirmation box
  const affY = barY + 15;
  ctx.fillStyle = 'rgba(245,197,66,0.06)';
  ctx.strokeStyle = 'rgba(245,197,66,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(70, affY, W-140, 70, 12); ctx.fill(); ctx.stroke();
  fillText('" ' + todayAffirm, W/2, affY+42, '22px sans-serif', '#fde68a');

  // Lucky items
  const luckyY = affY + 100;
  fillText(todayColor.icon + ' 幸运色', W/2-200, luckyY, '16px sans-serif', '#a8a3c0');
  fillText(todayColor.name, W/2-200, luckyY+28, 'bold 20px sans-serif', '#e2e0ef');
  fillText('🔢 幸运数字', W/2, luckyY, '16px sans-serif', '#a8a3c0');
  fillText(String(todayNum), W/2, luckyY+28, 'bold 20px sans-serif', '#e2e0ef');
  fillText(todayThing.icon + ' 幸运物', W/2+200, luckyY, '16px sans-serif', '#a8a3c0');
  fillText(todayThing.name, W/2+200, luckyY+28, 'bold 20px sans-serif', '#e2e0ef');

  // QR Code
  const siteUrl = 'https://tarot.1yong.com';
  const qrImg = await generateQR(siteUrl, 120);
  const qrY = luckyY + 80;
  if(qrImg){
    // White background for QR
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.roundRect(W/2-65, qrY-5, 130, 130, 8); ctx.fill();
    ctx.drawImage(qrImg, W/2-60, qrY, 120, 120);
  }
  fillText('长按识别二维码 · 抽你的每日一签', W/2, qrY+148, '16px sans-serif', 'rgba(255,255,255,0.4)');

  // Convert to blob and share/download
  c.toBlob(async (blob)=>{
    const file = new File([blob], 'daily-tarot.png', {type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{
        await navigator.share({files:[file], title:'每日一签 ✨'});
      }catch(e){}
    } else {
      // Fallback: download
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'daily-tarot.png';
      a.click();
      URL.revokeObjectURL(a.href);
    }
    btn.textContent = '📸 保存分享';
    btn.disabled = false;
  }, 'image/png');
}
</script>
